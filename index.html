<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeezers Arcade — HTML5 Game Hub</title>
  <meta name="description" content="Skeezers Arcade is an HTML5-only game hub with a massive, fast-loading browser catalog." />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="bg-glow"></div>

  <header class="hero">
    <h1>Skeezers Arcade</h1>
    <p>HTML5-only • Massive catalog • Fast launch</p>
  </header>

  <main class="container" id="app">
    <section class="toolbar">
      <input id="search" type="text" placeholder="Search HTML5 games..." />

      <select id="category">
        <option value="all">All categories</option>
      </select>

      <select id="sort">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>

      <button id="favoritesOnly" class="ghost">Favorites only</button>
      <button id="randomGame">Random game</button>
    </section>

    <section class="stats" id="stats"></section>

    <section class="grid" id="gamesGrid" aria-live="polite"></section>
  </main>

  <section id="player" class="player hidden">
    <div class="player-bar">
      <button id="backBtn">← Back to Library</button>
      <div id="nowPlaying"></div>
    </div>
    <iframe id="gameFrame" title="Game player" allowfullscreen loading="eager"></iframe>
  </section>

  <script src="js/config.js"></script>
  <script src="js/index.js" defer></script>
</body>

</html>
