<script>
// ── SFX Engine ──
let sfxAC = null;
let sfxVolume = 0.6;
let sfxMuted = false;
const sfxNoiseBuffers = {};

function sfxCtx() {
  if (!sfxAC) sfxAC = new (window.AudioContext || window.webkitAudioContext)();
  if (sfxAC.state === 'suspended') sfxAC.resume();
  return sfxAC;
}

function sfxInitNoise() {
  if (sfxNoiseBuffers.white) return;
  const a = sfxCtx(), sr = a.sampleRate, len = sr;
  const white = a.createBuffer(1, len, sr);
  const wd = white.getChannelData(0);
  for (let i = 0; i < len; i++) wd[i] = Math.random() * 2 - 1;
  sfxNoiseBuffers.white = white;
  const pink = a.createBuffer(1, len, sr);
  const pd = pink.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    pd[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
  }
  sfxNoiseBuffers.pink = pink;
  const brown = a.createBuffer(1, len, sr);
  const bd = brown.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    last = last + 0.02 * w;
    if (last > 1) last = 1; if (last < -1) last = -1;
    bd[i] = last * 3.5;
  }
  sfxNoiseBuffers.brown = brown;
}

function sfxMakeCurve(type, drive) {
  const n = 4096, c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i/(n-1))*2-1;
    if (type === 'softclip') c[i] = Math.tanh(drive * x);
    else if (type === 'hardclip') c[i] = Math.max(-1, Math.min(1, drive * x));
    else if (type === 'foldback') c[i] = Math.sin(drive * x * Math.PI);
    else c[i] = x;
  }
  return c;
}

function sfxReverbIR(decay, sr) {
  const len = Math.floor(sr * decay);
  const buf = sfxCtx().createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, decay*2);
  }
  return buf;
}

function playSFX(id) {
  if (sfxMuted || sfxVolume <= 0) return;
  if (typeof SOUND_DEFS === 'undefined' || !SOUND_DEFS[id]) return;
  const a = sfxCtx();
  sfxInitNoise();
  const snd = SOUND_DEFS[id];
  const env = snd.envelope;
  const now = a.currentTime;
  const dur = snd.duration;
  const vol = snd.masterVolume * sfxVolume;
  const FADE = 0.003; // 3ms anti-click fade
  const endTime = now + dur + env.release + 0.5;

  // Master gain with ADSR + anti-click fades
  const masterGain = a.createGain();
  const safeRelease = Math.max(env.release, FADE);
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(vol, now + Math.max(env.attack, FADE));
  const susVol = Math.max(0.0001, vol * env.sustain);
  masterGain.gain.linearRampToValueAtTime(susVol, now + env.attack + env.decay);
  masterGain.gain.setValueAtTime(susVol, now + dur);
  masterGain.gain.linearRampToValueAtTime(0.0001, now + dur + safeRelease);
  // Hard zero to guarantee silence before nodes stop
  masterGain.gain.setValueAtTime(0, now + dur + safeRelease + 0.001);

  // Build effects chain (backwards from destination)
  let chainTip = a.destination;
  const stops = [];

  // Reverb
  if (snd.reverb && snd.reverb.enabled) {
    const ir = sfxReverbIR(snd.reverb.decay, a.sampleRate);
    const conv = a.createConvolver(); conv.buffer = ir;
    const dG = a.createGain(); dG.gain.value = 1 - snd.reverb.mix;
    const wG = a.createGain(); wG.gain.value = snd.reverb.mix;
    const m = a.createGain(); m.connect(chainTip);
    dG.connect(m); conv.connect(wG); wG.connect(m);
    const sp = a.createGain(); sp.connect(dG); sp.connect(conv);
    chainTip = sp;
  }

  // Delay
  if (snd.delay && snd.delay.enabled) {
    const dl = a.createDelay(1.0); dl.delayTime.value = snd.delay.time;
    const fb = a.createGain(); fb.gain.value = snd.delay.feedback;
    const dG = a.createGain(); dG.gain.value = 1 - snd.delay.mix;
    const wG = a.createGain(); wG.gain.value = snd.delay.mix;
    const m = a.createGain(); m.connect(chainTip);
    dG.connect(m); dl.connect(fb); fb.connect(dl); dl.connect(wG); wG.connect(m);
    const sp = a.createGain(); sp.connect(dG); sp.connect(dl);
    chainTip = sp;
  }

  // Compressor
  if (snd.compressor && snd.compressor.enabled) {
    const c = a.createDynamicsCompressor();
    c.threshold.value = snd.compressor.threshold;
    c.knee.value = snd.compressor.knee;
    c.ratio.value = snd.compressor.ratio;
    c.attack.value = snd.compressor.attack;
    c.release.value = snd.compressor.release;
    c.connect(chainTip); chainTip = c;
  }

  // Phaser
  if (snd.phaser && snd.phaser.enabled) {
    const stages = snd.phaser.stages || 4;
    const out = a.createGain(); out.connect(chainTip);
    const filters = [];
    let prev = null;
    for (let i = 0; i < stages; i++) {
      const ap = a.createBiquadFilter(); ap.type = 'allpass'; ap.frequency.value = 1000; ap.Q.value = 0.5;
      filters.push(ap);
      if (prev) prev.connect(ap);
      prev = ap;
    }
    prev.connect(out);
    const fbG = a.createGain(); fbG.gain.value = snd.phaser.feedback;
    prev.connect(fbG); fbG.connect(filters[0]);
    const inp = a.createGain(); inp.connect(filters[0]); inp.connect(out);
    const lfo = a.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = snd.phaser.rate;
    for (const f of filters) { const g = a.createGain(); g.gain.value = snd.phaser.depth; lfo.connect(g); g.connect(f.frequency); }
    lfo.start(now); lfo.stop(endTime); stops.push(lfo);
    chainTip = inp;
  }

  // Chorus
  if (snd.chorus && snd.chorus.enabled) {
    const cd = a.createDelay(0.1); cd.delayTime.value = 0.01;
    const lfo = a.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = snd.chorus.rate;
    const lg = a.createGain(); lg.gain.value = snd.chorus.depth;
    lfo.connect(lg); lg.connect(cd.delayTime);
    const dG = a.createGain(); dG.gain.value = 1 - snd.chorus.mix;
    const wG = a.createGain(); wG.gain.value = snd.chorus.mix;
    const m = a.createGain(); m.connect(chainTip);
    dG.connect(m); cd.connect(wG); wG.connect(m);
    const sp = a.createGain(); sp.connect(dG); sp.connect(cd);
    lfo.start(now); lfo.stop(endTime); stops.push(lfo);
    chainTip = sp;
  }

  // EQ
  if (snd.eq && snd.eq.enabled) {
    const lo = a.createBiquadFilter(); lo.type = 'lowshelf'; lo.frequency.value = snd.eq.lowFreq; lo.gain.value = snd.eq.lowGain;
    const mi = a.createBiquadFilter(); mi.type = 'peaking'; mi.frequency.value = snd.eq.midFreq; mi.gain.value = snd.eq.midGain; mi.Q.value = snd.eq.midQ;
    const hi = a.createBiquadFilter(); hi.type = 'highshelf'; hi.frequency.value = snd.eq.highFreq; hi.gain.value = snd.eq.highGain;
    lo.connect(mi); mi.connect(hi); hi.connect(chainTip); chainTip = lo;
  }

  // Distortion
  if (snd.distortion && snd.distortion.enabled) {
    const ws = a.createWaveShaper(); ws.curve = sfxMakeCurve(snd.distortion.curve, snd.distortion.drive); ws.oversample = '2x';
    const dG = a.createGain(); dG.gain.value = 1 - snd.distortion.mix;
    const wG = a.createGain(); wG.gain.value = snd.distortion.mix;
    const m = a.createGain(); m.connect(chainTip);
    dG.connect(m); ws.connect(wG); wG.connect(m);
    const sp = a.createGain(); sp.connect(dG); sp.connect(ws);
    chainTip = sp;
  }

  // Tremolo
  if (snd.tremolo && snd.tremolo.enabled) {
    const tg = a.createGain(); tg.gain.value = 1 - snd.tremolo.depth * 0.5;
    const lfo = a.createOscillator(); lfo.type = snd.tremolo.wave; lfo.frequency.value = snd.tremolo.rate;
    const lg = a.createGain(); lg.gain.value = snd.tremolo.depth * 0.5;
    lfo.connect(lg); lg.connect(tg.gain);
    tg.connect(chainTip); lfo.start(now); lfo.stop(endTime); stops.push(lfo);
    chainTip = tg;
  }

  masterGain.connect(chainTip);

  // Build layers
  (snd.layers || []).forEach(layer => {
    if (!layer.enabled) return;
    const lg = a.createGain(); lg.gain.value = layer.gain;
    let tip = lg;

    // LFO → gain
    if (layer.lfo && layer.lfo.enabled && layer.lfo.dest === 'gain') {
      const o = a.createOscillator(); o.type = layer.lfo.wave; o.frequency.value = layer.lfo.rate;
      const g = a.createGain(); g.gain.value = layer.lfo.depth * layer.gain;
      o.connect(g); g.connect(lg.gain); o.start(now); o.stop(endTime); stops.push(o);
    }

    // Filter
    if (layer.filter && layer.filter.enabled) {
      const f = a.createBiquadFilter(); f.type = layer.filter.type; f.frequency.value = layer.filter.freq; f.Q.value = layer.filter.Q;
      if (layer.filter.envAmount) {
        const sf = Math.max(20, Math.min(20000, layer.filter.freq + layer.filter.envAmount));
        f.frequency.setValueAtTime(sf, now);
        f.frequency.linearRampToValueAtTime(layer.filter.freq, now + env.attack + env.decay);
      }
      if (layer.lfo && layer.lfo.enabled && layer.lfo.dest === 'filter') {
        const o = a.createOscillator(); o.type = layer.lfo.wave; o.frequency.value = layer.lfo.rate;
        const g = a.createGain(); g.gain.value = layer.lfo.depth * layer.filter.freq;
        o.connect(g); g.connect(f.frequency); o.start(now); o.stop(endTime); stops.push(o);
      }
      f.connect(tip); tip = f;
    }

    // Waveshaper
    if (layer.waveshaper && layer.waveshaper.enabled) {
      const ws = a.createWaveShaper(); ws.curve = sfxMakeCurve(layer.waveshaper.curve, layer.waveshaper.drive); ws.oversample = '2x';
      ws.connect(tip); tip = ws;
    }

    // Source
    const isNoise = ['white','pink','brown'].includes(layer.source.type);
    if (isNoise) {
      const s = a.createBufferSource(); s.buffer = sfxNoiseBuffers[layer.source.type]; s.loop = true;
      s.connect(tip); s.start(now); s.stop(endTime); stops.push(s);
    } else if (layer.source.type === 'fm') {
      const car = a.createOscillator(); car.type = 'sine';
      car.frequency.setValueAtTime(layer.source.freqStart, now);
      if (layer.source.freqEnd !== layer.source.freqStart) car.frequency.exponentialRampToValueAtTime(Math.max(1, layer.source.freqEnd), now + dur);
      car.detune.value = layer.source.detune || 0;
      const mod = a.createOscillator(); mod.type = 'sine';
      mod.frequency.value = layer.source.freqStart * (layer.fm ? layer.fm.ratio : 2);
      const mg = a.createGain(); mg.gain.value = layer.fm ? layer.fm.depth : 100;
      mod.connect(mg); mg.connect(car.frequency);
      if (layer.lfo && layer.lfo.enabled && layer.lfo.dest === 'pitch') {
        const o = a.createOscillator(); o.type = layer.lfo.wave; o.frequency.value = layer.lfo.rate;
        const g = a.createGain(); g.gain.value = layer.lfo.depth * 100;
        o.connect(g); g.connect(car.detune); o.start(now); o.stop(endTime); stops.push(o);
      }
      car.connect(tip); car.start(now); car.stop(endTime); mod.start(now); mod.stop(endTime); stops.push(car, mod);
    } else {
      const o = a.createOscillator(); o.type = layer.source.type;
      o.frequency.setValueAtTime(layer.source.freqStart, now);
      if (layer.source.freqEnd !== layer.source.freqStart) o.frequency.exponentialRampToValueAtTime(Math.max(1, layer.source.freqEnd), now + dur);
      o.detune.value = layer.source.detune || 0;
      if (layer.lfo && layer.lfo.enabled && layer.lfo.dest === 'pitch') {
        const l = a.createOscillator(); l.type = layer.lfo.wave; l.frequency.value = layer.lfo.rate;
        const g = a.createGain(); g.gain.value = layer.lfo.depth * 100;
        l.connect(g); g.connect(o.detune); l.start(now); l.stop(endTime); stops.push(l);
      }
      o.connect(tip); o.start(now); o.stop(endTime); stops.push(o);
    }

    lg.connect(masterGain);
  });
}

// SFX settings persistence
try {
  const sfxSaved = JSON.parse(localStorage.getItem('teabag_sfx') || '{}');
  if (sfxSaved.volume !== undefined) sfxVolume = sfxSaved.volume;

} catch(e) {}
function saveSFXSettings() {
  try { localStorage.setItem('teabag_sfx', JSON.stringify({ volume: sfxVolume, muted: sfxMuted })); } catch(e) {}
}

let TOTAL_W = W, SIDE_W = 0, GAME_OX = 0;
if (isMobile) {
  const screenW = Math.max(screen.width, screen.height);
  const screenH = Math.min(screen.width, screen.height);
  TOTAL_W = Math.round(H * (screenW / screenH));
  // Fixed 200px sidebars (≈2x S23 Ultra natural sidebar).
  // Clamp so visible game area is at least 700px wide.
  SIDE_W = Math.min(200, Math.floor((TOTAL_W - 700) / 2));
  SIDE_W = Math.max(SIDE_W, 0);
  // Center the 960-wide game; sidebars paint over the edges.
  GAME_OX = (TOTAL_W - W) / 2;
}
// How far sidebars overlap the game area on each side
const HUD_INSET = Math.max(0, SIDE_W - GAME_OX);
canvas.width = TOTAL_W * PX_SCALE; canvas.height = H * PX_SCALE;

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  if (isMobile) {
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
  } else {
    const s = Math.min(vw / W, vh / H);
    canvas.style.width = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
  }
}
resize();
window.addEventListener('resize', resize);

function initZoneLayout() {
  zoneLayout = [];
  if (gameMode === 'endless') {
    const zone = ZONE_BY_ID[endlessZoneId] || ZONES[0];
    zoneLayout.push({ zoneId: zone.id, startX: -999999, endX: 999999 });
  } else {
    let x = -500;
    for (const zone of ZONES) {
      zoneLayout.push({ zoneId: zone.id, startX: x, endX: x + zone.width });
      x += zone.width;
    }
  }
  currentZoneIndex = 0;
  currentZone = ZONE_BY_ID[zoneLayout[0].zoneId];
}

function getZoneAtX(worldX) {
  for (let i = 0; i < zoneLayout.length; i++) {
    const layout = zoneLayout[i];
    if (worldX >= layout.startX && worldX < layout.endX) {
      return { index: i, zone: ZONE_BY_ID[layout.zoneId], layout };
    }
  }
  // Before first zone — clamp to first
  const first = zoneLayout[0], last = zoneLayout[zoneLayout.length - 1];
  if (worldX < first.startX) return { index: 0, zone: ZONE_BY_ID[first.zoneId], layout: first };
  // Past last zone — cycle (handles BG-space coordinates after prestige)
  const totalWidth = last.endX - first.startX;
  const offset = (worldX - first.startX) % totalWidth;
  const wrapped = first.startX + offset;
  for (let i = 0; i < zoneLayout.length; i++) {
    const layout = zoneLayout[i];
    if (wrapped >= layout.startX && wrapped < layout.endX) {
      return { index: i, zone: ZONE_BY_ID[layout.zoneId], layout };
    }
  }
  return { index: 0, zone: ZONE_BY_ID[first.zoneId], layout: first };
}

// ── Zone Blending (shared by silhouettes, ground, color grading) ──
const ZONE_FADE_W = 600; // world units to cross-fade over
function getZoneBlend() {
  const leftZone = getZoneAtX(cam.x).zone;
  const rightZone = getZoneAtX(cam.x + W).zone;
  if (leftZone === rightZone) return { a: leftZone, b: leftZone, t: 0 };
  const boundaryX = getZoneAtX(cam.x).layout.endX;
  const camCenter = cam.x + W / 2;
  const t = clamp((camCenter - (boundaryX - ZONE_FADE_W / 2)) / ZONE_FADE_W, 0, 1);
  return { a: leftZone, b: rightZone, t };
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function rgbToHex(r, g, b) {
  return '#' + ((1 << 24) | (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b)).toString(16).slice(1);
}
function lerpColor(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  return rgbToHex(ca[0] + (cb[0] - ca[0]) * t, ca[1] + (cb[1] - ca[1]) * t, ca[2] + (cb[2] - ca[2]) * t);
}
const HEX_COLOR_RE = /^#[\da-fA-F]{6}$/;
function blendHexColor(hexColor, targetHex, amount) {
  if (typeof hexColor !== 'string' || typeof targetHex !== 'string') return hexColor;
  if (!HEX_COLOR_RE.test(hexColor) || !HEX_COLOR_RE.test(targetHex)) return hexColor;
  return lerpColor(hexColor, targetHex, clamp(amount, 0, 1));
}

// Key stops: [phase 0-1, skyTop, skyMid, skyBottom, ambientAlpha, starAlpha]
const SKY_STOPS = [
  { t: 0.00, top: '#0A0A1A', mid: '#0D1025', bot: '#141830', amb: 0.55, stars: 0.9 },  // midnight
  { t: 0.18, top: '#0D1025', mid: '#1A1030', bot: '#2A1535', amb: 0.45, stars: 0.6 },  // pre-dawn
  { t: 0.23, top: '#2A2045', mid: '#6B3A5A', bot: '#E8825A', amb: 0.2,  stars: 0.1 },  // dawn
  { t: 0.28, top: '#5A7EB5', mid: '#8AB4D0', bot: '#E8C5A0', amb: 0.05, stars: 0.0 },  // sunrise
  { t: 0.35, top: '#87CEEB', mid: '#B8E4F0', bot: '#E8D5B7', amb: 0.0,  stars: 0.0 },  // morning
  { t: 0.50, top: '#70B8E0', mid: '#A8D8EA', bot: '#D4C8A8', amb: 0.0,  stars: 0.0 },  // noon
  { t: 0.65, top: '#87CEEB', mid: '#B8E4F0', bot: '#E8D5B7', amb: 0.0,  stars: 0.0 },  // afternoon
  { t: 0.73, top: '#6A8AB0', mid: '#C09070', bot: '#E89050', amb: 0.05, stars: 0.0 },  // golden hour
  { t: 0.78, top: '#3A3068', mid: '#8A4565', bot: '#E87040', amb: 0.2,  stars: 0.05 }, // sunset
  { t: 0.83, top: '#1A1540', mid: '#2A1838', bot: '#4A2040', amb: 0.4,  stars: 0.4 },  // dusk
  { t: 0.90, top: '#0D1025', mid: '#141830', bot: '#1A1835', amb: 0.5,  stars: 0.7 },  // night
  { t: 1.00, top: '#0A0A1A', mid: '#0D1025', bot: '#141830', amb: 0.55, stars: 0.9 },  // midnight
];

function getDayValues(phase) {
  let i = 0;
  for (; i < SKY_STOPS.length - 1; i++) { if (SKY_STOPS[i + 1].t >= phase) break; }
  const a = SKY_STOPS[i], b = SKY_STOPS[i + 1];
  const t = (phase - a.t) / (b.t - a.t);
  return {
    top: lerpColor(a.top, b.top, t),
    mid: lerpColor(a.mid, b.mid, t),
    bot: lerpColor(a.bot, b.bot, t),
    amb: a.amb + (b.amb - a.amb) * t,
    stars: a.stars + (b.stars - a.stars) * t,
  };
}

const keys = {};

const doubleTap = { left: 0, right: 0 };
const DTAP_WINDOW = 0.3; // seconds between taps to trigger sprint
let sprintLocked = false; // stays true until direction released
window.addEventListener('keydown', e => {
  // Double-tap sprint detection (must check before keys[e.code] is set)
  if (!keys[e.code]) {
    justPressed[e.code] = true;
    const now = performance.now() / 1000;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft') {
      if (now - doubleTap.left < DTAP_WINDOW) sprintLocked = true;
      doubleTap.left = now;
    }
    if (e.code === 'KeyD' || e.code === 'ArrowRight') {
      if (now - doubleTap.right < DTAP_WINDOW) sprintLocked = true;
      doubleTap.right = now;
    }
  }
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyD' || e.code === 'ArrowRight') {
    if (!isDown('A') && !isDown('D')) sprintLocked = false;
  }
});
function isDown(k) {
  return keys['Key' + k] || keys['Arrow' + ({W:'Up',S:'Down',A:'Left',D:'Right'}[k]||'')] || false;
}
function wasPressed(k) {
  return justPressed['Key' + k] || justPressed['Arrow' + ({W:'Up',S:'Down',A:'Left',D:'Right'}[k]||'')] || false;
}

function jumpPressed() { return isDown('W') || touch.jump; }
function jumpJustPressed() { return wasPressed('W') || touch.jumpJust; }
function crouchDown() { return isDown('S') || keys['Space'] || (gameState === 'playing' && (touch.downHeld || touch.bagHeld)); }
function sprintDown() { return sprintLocked || touch.sprint; }

// ── Mobile Touch Controls ──
let showTouch = isMobile;
const touch = { left: false, right: false, jump: false, jumpJust: false, crouch: false, sprint: false, upJust: false, downJust: false, leftJust: false, rightJust: false, bagJust: false, pauseJust: false, upHeld: false, downHeld: false, bagHeld: false };
const touchIds = {}; // trackingId → buttonName

// D-pad hit detection (left side bar) — 4 circle buttons in diamond layout
const DPAD_CX = SIDE_W / 2, DPAD_CY = H / 2;
const DPAD_SPREAD = 55; // distance from center to each button center (diagonal gap > 2 * hit radius)
const DPAD_R = 30; // same visual radius as JUMP/BAG
const DPAD_HIT_R = Math.round(DPAD_R * 1.25); // 1.25x visual for touch zone
const DPAD_POS = {
  left:  { x: DPAD_CX - DPAD_SPREAD, y: DPAD_CY },
  right: { x: DPAD_CX + DPAD_SPREAD, y: DPAD_CY },
  up:    { x: DPAD_CX, y: DPAD_CY - DPAD_SPREAD },
  down:  { x: DPAD_CX, y: DPAD_CY + DPAD_SPREAD },
};
function getDpadDir(tx, ty) {
  for (const [dir, pos] of Object.entries(DPAD_POS)) {
    const dx = tx - pos.x, dy = ty - pos.y;
    if (dx * dx + dy * dy <= DPAD_HIT_R * DPAD_HIT_R) return dir;
  }
  return null;
}

// Action button hit detection (right side bar)
const RIGHT_BAR_X = TOTAL_W - SIDE_W;
const JUMP_CX = RIGHT_BAR_X + SIDE_W * 0.6, JUMP_CY = H * 0.42;
const BAG_CX = RIGHT_BAR_X + SIDE_W * 0.4, BAG_CY = H * 0.65;
const ACTION_R = 30, ACTION_HIT_R = Math.round(ACTION_R * 1.25);
const PAUSE_CX = RIGHT_BAR_X + SIDE_W / 2, PAUSE_CY = H * 0.15, PAUSE_R = 18;
function getActionBtn(tx, ty) {
  let dx = tx - JUMP_CX, dy = ty - JUMP_CY;
  if (dx * dx + dy * dy <= ACTION_HIT_R * ACTION_HIT_R) return 'jump';
  dx = tx - BAG_CX; dy = ty - BAG_CY;
  if (dx * dx + dy * dy <= ACTION_HIT_R * ACTION_HIT_R) return 'teabag';
  dx = tx - PAUSE_CX; dy = ty - PAUSE_CY;
  const PAUSE_HIT_R = Math.round(PAUSE_R * 1.25);
  if (dx * dx + dy * dy <= PAUSE_HIT_R * PAUSE_HIT_R) return 'pause';
  return null;
}

function getTouchBtn(x, y) {
  if (!isMobile) return null;
  const dir = getDpadDir(x, y);
  if (dir) return dir;
  return getActionBtn(x, y);
}

function touchToLogical(tx, ty) {
  const rect = canvas.getBoundingClientRect();
  return [(tx - rect.left) / rect.width * TOTAL_W, (ty - rect.top) / rect.height * H];
}

function handleTouchStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const [x, y] = touchToLogical(t.clientX, t.clientY);
    const btn = getTouchBtn(x, y);
    if (btn) {
      touchIds[t.identifier] = btn;
      applyTouch(btn, true);
    }
  }
}
function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const [x, y] = touchToLogical(t.clientX, t.clientY);
    const oldBtn = touchIds[t.identifier];
    const newBtn = getTouchBtn(x, y);
    if (oldBtn !== newBtn) {
      if (oldBtn) applyTouch(oldBtn, false);
      if (newBtn) { touchIds[t.identifier] = newBtn; applyTouch(newBtn, true); }
      else delete touchIds[t.identifier];
    }
  }
}
function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const btn = touchIds[t.identifier];
    if (btn) applyTouch(btn, false);
    delete touchIds[t.identifier];
  }
}

const touchDTap = { left: 0, right: 0 };
function applyTouch(btn, down) {
  if (btn === 'left') {
    touch.left = down;
    if (down) {
      touch.leftJust = true;
      const now = performance.now() / 1000;
      if (now - touchDTap.left < DTAP_WINDOW) touch.sprint = true;
      touchDTap.left = now;
    }
    if (!down && !touch.right) touch.sprint = false;
  }
  else if (btn === 'right') {
    touch.right = down;
    if (down) {
      touch.rightJust = true;
      const now = performance.now() / 1000;
      if (now - touchDTap.right < DTAP_WINDOW) touch.sprint = true;
      touchDTap.right = now;
    }
    if (!down && !touch.left) touch.sprint = false;
  }
  else if (btn === 'up') { touch.upHeld = down; if (down) touch.upJust = true; }
  else if (btn === 'down') { touch.downHeld = down; if (down) touch.downJust = true; if (gameState === 'playing') touch.crouch = down; }
  else if (btn === 'jump') { touch.jump = down; if (down) touch.jumpJust = true; }
  else if (btn === 'teabag') { touch.bagHeld = down; if (down) touch.bagJust = true; if (gameState === 'playing') touch.crouch = down; }
  else if (btn === 'pause') { if (down) touch.pauseJust = true; }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });

    ctx.beginPath(); ctx.arc(pos.x, pos.y, DPAD_R, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, DPAD_R, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = btn.active ? '#fff' : '#888'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(btn.glyph, pos.x, pos.y);
  }

  // Sprint hint
  ctx.fillStyle = '#555'; ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('2x TAP: SPRINT', DPAD_CX, DPAD_POS.down.y + DPAD_R + 14);

  // Right bar background
  ctx.fillStyle = '#111';
  ctx.fillRect(TOTAL_W - SIDE_W, 0, SIDE_W, H);
  ctx.fillStyle = '#222';
  ctx.fillRect(TOTAL_W - SIDE_W, 0, 1, H);

  // JUMP button
  ctx.fillStyle = touch.jump ? 'rgba(74,222,128,0.5)' : 'rgba(74,222,128,0.3)';
  ctx.beginPath(); ctx.arc(JUMP_CX, JUMP_CY, ACTION_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(74,222,128,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(JUMP_CX, JUMP_CY, ACTION_R, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('JUMP', JUMP_CX, JUMP_CY);

  // BAG button
  ctx.fillStyle = touch.bagHeld ? 'rgba(251,191,36,0.5)' : 'rgba(251,191,36,0.3)';
  ctx.beginPath(); ctx.arc(BAG_CX, BAG_CY, ACTION_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(251,191,36,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(BAG_CX, BAG_CY, ACTION_R, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace';
  ctx.fillText('BAG', BAG_CX, BAG_CY);

  // PAUSE button (small, top of right bar)
  ctx.fillStyle = 'rgba(180,180,180,0.25)';
  ctx.beginPath(); ctx.arc(PAUSE_CX, PAUSE_CY, PAUSE_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,180,180,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(PAUSE_CX, PAUSE_CY, PAUSE_R, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#aaa'; ctx.fillRect(PAUSE_CX - 5, PAUSE_CY - 6, 4, 12);
  ctx.fillRect(PAUSE_CX + 1, PAUSE_CY - 6, 4, 12);

  ctx.textBaseline = 'alphabetic';
}

// ── Particles ──
const particles = [];
const matterFX = {
  enabled: false,
  warnedMissing: false,
  engine: null,
  floor: null,
  bodies: [],
  surfaceBodies: new Map(),
};

function getMatterFloorCenterY(fx) {
  return GROUND_Y + fx.matterFloorOffset + fx.matterFloorThickness * 0.5;
}

function syncMatterSurfaceColliders(leftBound, rightBound) {
  if (!matterFX.enabled) return;
  const fx = TUNING.vfx;
  const { Bodies, Body, Composite } = Matter;
  const minX = leftBound - fx.matterSurfaceRangePad;
  const maxX = rightBound + fx.matterSurfaceRangePad;
  const activePlatforms = new Set();
  const world = matterFX.engine.world;
  const surfaceThickness = fx.matterSurfaceThickness;

  for (const plat of platforms) {
    if (plat.x + plat.w < minX || plat.x > maxX) continue;
    activePlatforms.add(plat);
    const x = plat.x + plat.w * 0.5;
    const y = plat.y + surfaceThickness * 0.5;
    let body = matterFX.surfaceBodies.get(plat);
    if (!body) {
      body = Bodies.rectangle(x, y, Math.max(12, plat.w), surfaceThickness, {
        isStatic: true,
        friction: fx.matterSurfaceFriction,
        restitution: fx.matterSurfaceRestitution,
        label: plat.isBusStop ? 'fx-bus-stop-surface' : 'fx-platform-surface',
      });
      Composite.add(world, body);
      matterFX.surfaceBodies.set(plat, body);
    } else {
      Body.setPosition(body, { x, y });
    }
  }

  for (const [plat, body] of matterFX.surfaceBodies) {
    if (activePlatforms.has(plat)) continue;
    Composite.remove(world, body);
    matterFX.surfaceBodies.delete(plat);
  }
}

function initMatterFX() {
  const fx = TUNING.vfx;
  if (!fx.matterEnabled) return;
  if (!window.Matter) {
    if (!matterFX.warnedMissing) {
      console.warn('[MatterFX] Matter.js unavailable; falling back to classic particles only.');
      matterFX.warnedMissing = true;
    }
    return;
  }
  const { Engine, Bodies, Composite } = Matter;
  const engine = Engine.create();
  engine.gravity.x = 0;
  engine.gravity.y = fx.matterGravity;
  const floor = Bodies.rectangle(cam.x + W / 2, getMatterFloorCenterY(fx), W * 3, fx.matterFloorThickness, {
    isStatic: true,
    friction: fx.matterFloorFriction,
    restitution: fx.matterFloorRestitution,
    label: 'fx-floor',
  });
  Composite.add(engine.world, floor);
  matterFX.enabled = true;
  matterFX.engine = engine;
  matterFX.floor = floor;
}

function clearMatterFX() {
  if (!matterFX.enabled) return;
  const { Composite } = Matter;
  for (const entry of matterFX.bodies) Composite.remove(matterFX.engine.world, entry.body);
  for (const body of matterFX.surfaceBodies.values()) Composite.remove(matterFX.engine.world, body);
  matterFX.bodies.length = 0;
  matterFX.surfaceBodies.clear();
}

function spawnMatterDebris(x, y, count, color, opts) {
  if (!matterFX.enabled || count <= 0) return;
  const fx = TUNING.vfx;
  const { Bodies, Body, Composite } = Matter;
  const cfg = opts || {};
  const spread = cfg.spread ?? 10;
  const speedMin = cfg.speedMin ?? 18;
  const speedMax = cfg.speedMax ?? 70;
  const velScale = fx.matterVelocityScale ?? 1;
  const scaledSpeedMin = Math.max(0.2, speedMin * velScale);
  const scaledSpeedMax = Math.max(scaledSpeedMin + 0.1, speedMax * velScale);
  const sizeMin = cfg.sizeMin ?? 2;
  const sizeMax = cfg.sizeMax ?? 5;
  const spawnChance = cfg.spawnChance ?? fx.matterSpawnChance;
  const fill = color || '#ccc';

  for (let i = 0; i < count; i++) {
    if (Math.random() > spawnChance) continue;
    const px = x + rand(-spread, spread);
    const py = y - rand(0, 8);
    const size = rand(sizeMin, sizeMax);
    const isCircle = Math.random() > 0.5;
    const body = isCircle
      ? Bodies.circle(px, py, size * 0.5, {
          restitution: fx.matterFloorRestitution,
          frictionAir: fx.matterLinearDamping,
          friction: 0.02,
        })
      : Bodies.rectangle(px, py, size, size, {
          restitution: fx.matterFloorRestitution,
          frictionAir: fx.matterLinearDamping,
          friction: 0.02,
        });
    Body.setVelocity(body, {
      x: rand(-scaledSpeedMax, scaledSpeedMax),
      y: rand(-scaledSpeedMax, -scaledSpeedMin),
    });
    Body.setAngularVelocity(body, rand(-1.8, 1.8));
    Composite.add(matterFX.engine.world, body);
    matterFX.bodies.push({
      body,
      isCircle,
      color: fill,
      size,
      life: fx.matterBodyLife,
      maxLife: fx.matterBodyLife,
    });
  }

  const overflow = matterFX.bodies.length - fx.matterMaxBodies;
  if (overflow > 0) {
    for (let i = 0; i < overflow; i++) {
      const removed = matterFX.bodies.shift();
      if (removed) Composite.remove(matterFX.engine.world, removed.body);
    }
  }
}

function updateMatterFX(dt) {
  if (!matterFX.enabled) return;
  const fx = TUNING.vfx;
  const { Engine, Body, Composite } = Matter;
  Body.setPosition(matterFX.floor, { x: cam.x + W / 2, y: getMatterFloorCenterY(fx) });
  Engine.update(matterFX.engine, dt * 1000);
  for (let i = matterFX.bodies.length - 1; i >= 0; i--) {
    const entry = matterFX.bodies[i];
    entry.life -= dt;
    const bx = entry.body.position.x;
    const by = entry.body.position.y;
    if (
      entry.life <= 0 ||
      bx < cam.x - W * 2 ||
      bx > cam.x + W * 2 ||
      by > H + 220
    ) {
      Composite.remove(matterFX.engine.world, entry.body);
      matterFX.bodies.splice(i, 1);
    }
  }
}

function drawMatterFX() {
  if (!matterFX.enabled) return;
  for (const entry of matterFX.bodies) {
    const alpha = clamp(entry.life / entry.maxLife, 0, 1);
    const p = entry.body.position;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x - cam.x, p.y);
    ctx.rotate(entry.body.angle);
    ctx.fillStyle = entry.color;
    if (entry.isCircle) {
      ctx.beginPath();
      ctx.arc(0, 0, entry.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-entry.size * 0.5, -entry.size * 0.5, entry.size, entry.size);
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function spawnDust(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: rand(-80, 80), vy: rand(-120, -20), life: rand(0.2, 0.5), maxLife: 0.5, size: rand(2, 5), color: color || '#ccc' });
  }
  spawnMatterDebris(x, y, count, color || '#ccc', {
    spread: 8,
    speedMin: 16,
    speedMax: 50,
    sizeMin: 1.8,
    sizeMax: 4.8,
  });
}
function spawnStars(x, y, count) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(60, 150);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, life: rand(0.3, 0.7), maxLife: 0.7, size: rand(3, 6), color: '#FFD700', star: true });
  }
}
function spawnImpact(x, y) {
  for (let i = 0; i < 4; i++) {
    particles.push({ x, y, vx: rand(-40, 40), vy: rand(-60, -10), life: rand(0.15, 0.3), maxLife: 0.3, size: rand(2, 4), color: '#fff' });
  }
  spawnMatterDebris(x, y, 3, '#fff', {
    spread: 5,
    speedMin: 20,
    speedMax: 58,
    sizeMin: 1.6,
    sizeMax: 3.6,
  });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
    if (p.star) { drawStar(p.x - cam.x, p.y, p.size, p.color); }
    else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x - cam.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
}
function drawStar(x, y, r, color) {
  ctx.fillStyle = color; ctx.beginPath();
  for (let i = 0; i < 5; i++) { const a = (i * 4 * Math.PI / 5) - Math.PI / 2; ctx[i === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(a) * r, y + Math.sin(a) * r); }
  ctx.closePath(); ctx.fill();
}
function drawTeabag(x, y, s, alpha) {
  // s = scale factor (1 = ~20px tall)
  const a = alpha !== undefined ? alpha : 1;
  ctx.globalAlpha = a;
  // String
  ctx.strokeStyle = '#8B6E4E'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y - 8 * s); ctx.lineTo(x, y - 14 * s); ctx.stroke();
  // Tag
  ctx.fillStyle = '#E8D5B7';
  ctx.fillRect(x - 3 * s, y - 18 * s, 6 * s, 4 * s);
  ctx.strokeStyle = '#8B6E4E'; ctx.lineWidth = 0.5;
  ctx.strokeRect(x - 3 * s, y - 18 * s, 6 * s, 4 * s);
  // Bag body
  ctx.fillStyle = '#C8956B';
  ctx.beginPath();
  ctx.moveTo(x - 5 * s, y - 8 * s);
  ctx.lineTo(x + 5 * s, y - 8 * s);
  ctx.lineTo(x + 6 * s, y + 4 * s);
  ctx.quadraticCurveTo(x, y + 7 * s, x - 6 * s, y + 4 * s);
  ctx.closePath(); ctx.fill();
  // Bag outline
  ctx.strokeStyle = '#8B6E4E'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 5 * s, y - 8 * s);
  ctx.lineTo(x + 5 * s, y - 8 * s);
  ctx.lineTo(x + 6 * s, y + 4 * s);
  ctx.quadraticCurveTo(x, y + 7 * s, x - 6 * s, y + 4 * s);
  ctx.closePath(); ctx.stroke();
  // Tea stain drip
  ctx.fillStyle = '#A0764E'; ctx.globalAlpha = a * 0.5;
  ctx.beginPath(); ctx.arc(x + 2 * s, y + 6 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ── Screen Shake ──
let shakeAmount = 0, shakeDuration = 0;
function addShake(amount, dur) { shakeAmount = amount; shakeDuration = dur; }
function getShakeOffset(dt) {
  if (shakeDuration > 0) { shakeDuration -= dt; const t = shakeDuration > 0 ? shakeAmount * (shakeDuration / 0.3) : 0; return { x: rand(-t, t), y: rand(-t, t) }; }
  return { x: 0, y: 0 };
}

const cam = {
  x: 0,
  targetX: 0,
  leadFactor: TUNING.world.cameraLeadFactor,
  followLerp: TUNING.world.cameraFollowLerp,
  zoom: TUNING.world.cameraZoom,
  forwardLookAhead: TUNING.world.cameraForwardLookAhead,
  handheldPhase: 0,
  handheldX: 0,
  handheldY: 0,
  sprintTight: false,
  sprintTween: null,
};

function setSprintCameraTightening(isTight, isAirSprintJump) {
  const wt = TUNING.world;
  if (cam.sprintTight === isTight) return;
  cam.sprintTight = isTight;

  const leadTarget = isTight ? wt.cameraSprintLeadFactor : wt.cameraLeadFactor;
  const followTarget = isTight ? wt.cameraSprintFollowLerp : wt.cameraFollowLerp;
  const zoomTarget = isTight ? wt.cameraSprintZoom : wt.cameraZoom;
  const lookAheadTarget = isTight ? wt.cameraSprintForwardLookAhead : wt.cameraForwardLookAhead;

  if (!window.gsap) {
    cam.leadFactor = leadTarget;
    cam.followLerp = followTarget;
    cam.zoom = zoomTarget;
    cam.forwardLookAhead = lookAheadTarget;
    return;
  }
  if (cam.sprintTween) cam.sprintTween.kill();
  const tweenInDuration = isAirSprintJump ? wt.cameraSprintAirTweenIn : wt.cameraSprintTweenIn;
  cam.sprintTween = window.gsap.to(cam, {
    leadFactor: leadTarget,
    followLerp: followTarget,
    zoom: zoomTarget,
    forwardLookAhead: lookAheadTarget,
    duration: isTight ? tweenInDuration : wt.cameraSprintTweenOut,
    ease: isTight ? wt.cameraSprintEaseIn : wt.cameraSprintEaseOut,
    overwrite: true,
    onComplete: () => { cam.sprintTween = null; },
  });
}

// ── Platforms (Smash Bros style) ──
const platforms = [];
let platGenRight = -200;
let platGenLeft = -200;
const PLAT_FEET_OFFSET = 10; // how far below anchor feet extend visually
const BUS_STOP_W = 250, BUS_STOP_ROOF_H = 119; // roof 119gu above ground (ground line at sprite y=238)
const BUS_STOP_IMG_H = 124; // full sprite height in game units (248px @ 2x)
const busStopImg = new Image(); busStopImg.src = 'sprites/busstop.png';

function pickBusStopCount() {
  const r = Math.random();
  if (r < 0.35) return 3;
  if (r < 0.65) return 2;
  if (r < 0.85) return 4;
  if (r < 0.95) return 5;
  return 1;
}

function spawnBusStopNPCs(platW) {
  const count = pickBusStopCount();
  const result = [];
  const hasGothMommy = count === 1 ? Math.random() < 0.95 : Math.random() < 0.01;
  for (let i = 0; i < count; i++) {
    let npcType, color, skinColor, hairColor, hairStyle, eyeColor, legColor, shoeColor, w, h, feminineBody, bustScale;
    if ((count === 1 && hasGothMommy) || (count > 1 && hasGothMommy && i === 0)) {
      const def = CHAR_BY_NAME['gothmommy'];
      npcType = 'gothmommy'; color = def.color; skinColor = def.skinColor;
      hairColor = def.hairColor; hairStyle = def.hairStyle;
      eyeColor = def.eyeColor; legColor = def.legColor;
      shoeColor = def.shoeColor;
      feminineBody = def.feminineBody; bustScale = def.bustScale;
      w = Math.round(BASE_W * def.wScale); h = Math.round(BASE_H * def.hScale);
    } else {
      npcType = 'normal';
      color = NPC_COLORS[randInt(0, NPC_COLORS.length - 1)];
      hairColor = HAIR_COLORS[randInt(0, HAIR_COLORS.length - 1)];
      skinColor = SKIN_COLORS[randInt(0, SKIN_COLORS.length - 1)];
      hairStyle = HAIR_STYLES[randInt(0, HAIR_STYLES.length - 1)];
      eyeColor = undefined; legColor = undefined; shoeColor = undefined;
      feminineBody = false; bustScale = 0;
      w = BASE_W; h = BASE_H;
    }
    const spacing = platW / (count + 1);
    result.push({
      xOffset: spacing * (i + 1),
      w, h, facing: Math.random() > 0.5 ? 1 : -1,
      color, skinColor, hairColor, hairStyle, eyeColor, legColor, shoeColor, npcType,
      feminineBody, bustScale,
      breathPhase: rand(0, Math.PI * 2), blinkTimer: rand(1, 4),
      panicState: false, panicPhase: 0,
      armsWave: Math.random() > 0.5,
    });
  }
  return result;
}

function makePlatform(x, y, w, zone) {
  const z = zone || currentZone;
  const colors = z.platColors;
  return { x, y, w, h: 6, color: colors[randInt(0, colors.length - 1)] };
}

function makeBusStop(x) {
  return {
    x, y: GROUND_Y - BUS_STOP_ROOF_H, w: BUS_STOP_W, h: 6, color: '#8896A4', isBusStop: true,
    busStop: { npcs: spawnBusStopNPCs(BUS_STOP_W) },
  };
}

function generatePlatforms(leftBound, rightBound) {
  while (platGenRight < rightBound + 400) {
    const zone = getZoneAtX(platGenRight).zone;
    if (Math.random() > 0.55) {
      const py = GROUND_Y - rand(55, 140);
      if (zone.allowBusStops && Math.random() < 0.12) {
        platforms.push(makeBusStop(platGenRight + rand(0, 60)));
        platGenRight += randInt(350, 500);
        continue;
      }
      const pw = Math.random() < 0.2 ? rand(160, 280) : rand(60, 130);
      platforms.push(makePlatform(platGenRight + rand(0, 120), py, pw, zone));
      if (Math.random() > 0.7) {
        platforms.push(makePlatform(platGenRight + rand(20, 100), py - rand(50, 80), rand(40, 80), zone));
      }
    }
    platGenRight += randInt(150, 350);
  }
  while (platGenLeft > leftBound - 400) {
    const zone = getZoneAtX(platGenLeft).zone;
    if (Math.random() > 0.55) {
      const py = GROUND_Y - rand(55, 140);
      if (zone.allowBusStops && Math.random() < 0.12) {
        platforms.push(makeBusStop(platGenLeft - rand(0, 60) - BUS_STOP_W));
        platGenLeft -= randInt(350, 500);
        continue;
      }
      const pw = Math.random() < 0.2 ? rand(160, 280) : rand(60, 130);
      platforms.push(makePlatform(platGenLeft - rand(0, 120) - pw, py, pw, zone));
      if (Math.random() > 0.7) {
        platforms.push(makePlatform(platGenLeft - rand(20, 100) - rand(40, 80), py - rand(50, 80), rand(40, 80), zone));
      }
    }
    platGenLeft -= randInt(150, 350);
  }
  syncMatterSurfaceColliders(leftBound, rightBound);
}

function drawPlatform(plat) {
  const px = plat.x - cam.x;
  ctx.fillStyle = plat.color;
  roundRect(ctx, px, plat.y, plat.w, plat.h, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px + 3, plat.y, plat.w - 6, 2);
  ctx.fillStyle = plat.color; ctx.globalAlpha = 0.3;
  ctx.fillRect(px + 8, plat.y + plat.h, 4, GROUND_Y - plat.y - plat.h);
  ctx.fillRect(px + plat.w - 12, plat.y + plat.h, 4, GROUND_Y - plat.y - plat.h);

}

function drawBusStopStructure(plat) {

function drawBusStopFrontGlass(plat) {

function drawBusStopNPCs(plat, playerScreenX, playerScreenY) {
  const wt = TUNING.world;
  const colorAnchor = wt.busStopDecorColorAnchor;
  const npcGroundY = GROUND_Y - wt.busStopDecorLiftY;
  const px = plat.x - cam.x;
  for (const bNpc of plat.busStop.npcs) {

    const drawOpts = {
      facing: bNpc.facing,
      color: blendHexColor(bNpc.color, colorAnchor, wt.busStopDecorColorGrade),
      skinColor: blendHexColor(bNpc.skinColor, colorAnchor, wt.busStopDecorSkinGrade),

      legColor: blendHexColor(bNpc.legColor, colorAnchor, wt.busStopDecorColorGrade),
      shoeColor: blendHexColor(bNpc.shoeColor, colorAnchor, wt.busStopDecorColorGrade),

      feminineBody: bNpc.feminineBody, bustScale: bNpc.bustScale,

      blinkTimer: bNpc.blinkTimer,
      lookAtScreenX: playerScreenX, lookAtScreenY: playerScreenY,

    if (bNpc.panicState) {
      if (bNpc.armsWave) {
        drawOpts.isFleeing = true;

        drawOpts.openMouth = true;

    drawCharacter(
      npcScreenX,
      npcGroundY,
      bNpc.w * wt.busStopDecorScale,
      bNpc.h * wt.busStopDecorScale,

const buildings = [];
const bgBuildings = [];
const props = [];
let cityGenRight = -200;
let cityGenLeft = -200;

const WINDOW_OFF = '#4A5568';

const CITY_GAP_PROFILE = Object.freeze({

function sampleCityGap(zoneId, layer) {
  const zoneProfile = CITY_GAP_PROFILE[zoneId] || CITY_GAP_PROFILE.default;
  const profile = zoneProfile[layer] || CITY_GAP_PROFILE.default[layer];
  if (Math.random() < profile.largeGapChance) return randInt(profile.largeMin, profile.largeMax);
  return randInt(profile.min, profile.max);
}

function advanceCityCursor(cursor, dir, width, zoneId, layer) {
  const gap = sampleCityGap(zoneId, layer);
  return cursor + (Math.max(0, width) + gap) * dir;
}

function genBuilding(x, layer, zone) {
  const z = zone || currentZone;
  const bColors = z.buildingColors;
  const aColors = z.accentColors;
  const hRange = z.bgBuildingHeightRange || [180, 380];
  const zid = z.id;
  let w, h;
  if (layer === 'bg') {
    w = randInt(50, 120); h = randInt(hRange[0], hRange[1]);
  } else if (zid === 'shopping') {
    w = randInt(80, 160); h = randInt(90, 160);
  } else if (zid === 'park') {
    w = randInt(40, 80); h = randInt(60, 110);
  } else if (zid === 'industrial') {
    w = randInt(100, 200); h = randInt(100, 220);
  } else if (zid === 'suburbs') {
    w = randInt(70, 130); h = randInt(80, 150);
  } else {
    w = randInt(60, 140); h = randInt(150, 320);
  }
  const color = bColors[randInt(0, bColors.length - 1)];
  const accent = aColors[randInt(0, aColors.length - 1)];
  const windowCols = Math.floor(w / 20), windowRows = Math.floor(h / 25);
  const windows = [];
  for (let r = 0; r < windowRows; r++) for (let c = 0; c < windowCols; c++) windows.push({ r, c, lit: Math.random() > 0.4, nightLit: Math.random() > 0.25 });
  const b = { x, w, h, color, accent, windows, windowCols, windowRows, zoneId: zid };
  // Zone-specific shape data
  if (zid === 'shopping' && layer !== 'bg') {
    b.awningColor = aColors[randInt(0, aColors.length - 1)];
    b.awningStripe = aColors[randInt(0, aColors.length - 1)];
    b.hasDisplay = Math.random() > 0.3;
  } else if (zid === 'park' && layer !== 'bg') {
    b.roofType = 'peaked';
    b.roofColor = '#6B4E2A';
  } else if (zid === 'redlight' && layer !== 'bg') {
    const neons = ['#FF1493','#00FFFF','#FF4500','#FFD700','#FF00FF','#00FF7F'];
    b.neonColor = neons[randInt(0, neons.length - 1)];
    b.neonCount = randInt(1, 3);
  } else if (zid === 'industrial' && layer !== 'bg') {
    b.roofType = Math.random() > 0.5 ? 'corrugated' : 'flat';
    b.hasDoor = Math.random() > 0.4;
    b.doorColor = '#4A4A4A';
  } else if (zid === 'suburbs' && layer !== 'bg') {
    b.roofType = 'triangle';
    b.roofColor = accent;
    b.hasDoor = true;
    b.doorColor = accent;
  }
  return b;
}

function pickZoneProp(zone) {
  const z = zone || currentZone;
  const types = z.propTypes;
  const weights = z.propWeights;
  const totalW = types.reduce((s, t) => s + (weights[t] || 10), 0);
  let r = Math.random() * totalW;
  for (const t of types) { r -= (weights[t] || 10); if (r <= 0) return t; }
  return types[0];
}

function createProp(type, x, zoneId) {
  const p = { type, x, zoneId: zoneId || currentZone.id };
  // Pre-randomize colors for neon signs to avoid flicker
  if (type === 'neon_sign') {
    const neonColors = ['#FF1493','#00FFFF','#FF4500','#FFD700','#FF00FF','#00FF7F'];
    p.neonColor = neonColors[randInt(0, neonColors.length - 1)];
    p.neonW = randInt(12, 24);
    p.neonH = randInt(6, 12);
  }
  if (type === 'tree') {
    p.trunkH = randInt(30, 50);
    p.canopyR = randInt(18, 30);
    const greens = ['#2D8B4E','#3DA05E','#228B22','#4CAF50','#1B5E20'];
    p.canopyColor = greens[randInt(0, greens.length - 1)];
  }
  if (type === 'garden_bush') {
    const greens = ['#38A169','#48BB78','#2F855A','#68D391'];
    p.bushColor = greens[randInt(0, greens.length - 1)];
    p.bushR = randInt(8, 14);
  }
  if (type === 'fence_segment') {
    p.fenceW = randInt(30, 60);
  }
  return p;
}

function generateCity(leftBound, rightBound) {
  // FG buildings (parallax 0.7) — rightward
  while (cityGenRight < rightBound + 300) {
    const zone = getZoneAtX(cityGenRight).zone;
    const b = genBuilding(cityGenRight, 'fg', zone);
    buildings.push(b);
    if (Math.random() > 0.5) props.push(createProp(pickZoneProp(zone), b.x + rand(10, 50), zone.id));
    if (Math.random() > 0.7) props.push(createProp(pickZoneProp(zone), b.x + rand(20, 80), zone.id));
    cityGenRight = advanceCityCursor(cityGenRight, 1, b.w, zone.id, 'fg');
  }
  // FG buildings — leftward
  while (cityGenLeft > leftBound - 300) {
    const zone = getZoneAtX(cityGenLeft).zone;
    const b = genBuilding(cityGenLeft, 'fg', zone);
    b.x = cityGenLeft - b.w;
    buildings.push(b);
    if (Math.random() > 0.5) props.push(createProp(pickZoneProp(zone), b.x + rand(10, 50), zone.id));
    if (Math.random() > 0.7) props.push(createProp(pickZoneProp(zone), b.x + rand(20, 80), zone.id));
    cityGenLeft = advanceCityCursor(cityGenLeft, -1, b.w, zone.id, 'fg');
  }
  // BG buildings (parallax 0.3) — rightward
  const bgRightBound = rightBound + W / 0.3;
  while (bgGenRight < bgRightBound) {
    const zone = getZoneAtX(bgGenRight).zone;
    const b = genBuilding(bgGenRight, 'bg', zone);
    bgBuildings.push(b);
    bgGenRight = advanceCityCursor(bgGenRight, 1, b.w, zone.id, 'bg');
  }
  // BG buildings — leftward
  const bgLeftBound = leftBound - W / 0.3;
  while (bgGenLeft > bgLeftBound) {
    const zone = getZoneAtX(bgGenLeft).zone;
    const b = genBuilding(bgGenLeft, 'bg', zone);
    b.x = bgGenLeft - b.w;
    bgBuildings.push(b);
    bgGenLeft = advanceCityCursor(bgGenLeft, -1, b.w, zone.id, 'bg');
  }
}

function drawBuilding(b, parallax) {
  const bx = b.x * parallax - cam.x * parallax, by = GROUND_Y - b.h;
  const dayP = dayTime / DAY_CYCLE;
  const nightAmount = getDayValues(dayP).amb;
  const isNight = nightAmount > 0.15;
  const zid = b.zoneId || 'downtown';

  if (zid === 'shopping') {
    // Storefront — building body
    ctx.fillStyle = b.color; ctx.fillRect(bx, by, b.w, b.h + 20);
    // Accent stripe at top
    ctx.fillStyle = b.accent; ctx.fillRect(bx, by, b.w, 3);
    // Small awning over ground floor
    const awH = 6, awY = GROUND_Y - Math.min(b.h * 0.45, 65);
    ctx.fillStyle = b.awningColor || b.accent;
    ctx.fillRect(bx - 2, awY, b.w + 4, awH);
    // Subtle awning stripes
    ctx.globalAlpha = 0.3; ctx.fillStyle = b.color;
    for (let s = 0; s < b.w + 4; s += 8) ctx.fillRect(bx - 2 + s, awY, 4, awH);
    ctx.globalAlpha = 1;
    // Display window below awning
    if (b.hasDisplay) {
      const dwW = b.w * 0.65, dwH = Math.min(b.h * 0.25, 35);
      const dwX = bx + (b.w - dwW) / 2, dwY = awY + awH + 4;
      ctx.fillStyle = isNight ? '#1A1818' : 'rgba(180,210,230,0.5)';
      ctx.fillRect(dwX, dwY, dwW, dwH);
      if (isNight) {
        ctx.fillStyle = 'rgba(255,228,161,0.1)'; ctx.fillRect(dwX, dwY, dwW, dwH);
      }
    }
    // Upper windows
    const ww = 10, wh = 12, padX = (b.w - b.windowCols * 18) / 2 + 4, padY = 10;
    for (const win of b.windows) {
      const wy = by + padY + win.r * 22;
      if (wy + wh > awY - 4) continue;
      const isLit = isNight ? win.nightLit : win.lit;
      ctx.fillStyle = isLit ? (isNight ? '#FFE4A1' : 'rgba(255,228,161,0.3)') : (isNight ? '#1A1818' : WINDOW_OFF);
      ctx.fillRect(bx + padX + win.c * 18, wy, ww, wh);
    }

  } else if (zid === 'park') {
    // Park pavilion — peaked roof + open body
    ctx.fillStyle = b.color; ctx.fillRect(bx, by + 20, b.w, b.h - 20 + 20);
    // Peaked roof
    ctx.fillStyle = b.roofColor || '#6B4E2A';
    ctx.beginPath();
    ctx.moveTo(bx - 6, by + 20);
    ctx.lineTo(bx + b.w / 2, by - 8);
    ctx.lineTo(bx + b.w + 6, by + 20);
    ctx.closePath();
    ctx.fill();
    // Support posts
    ctx.fillStyle = '#6B4E2A';
    ctx.fillRect(bx + 3, by + 20, 4, b.h - 20);
    ctx.fillRect(bx + b.w - 7, by + 20, 4, b.h - 20);
    // Small windows
    const ww = 8, wh = 8;
    const padX = (b.w - b.windowCols * 16) / 2 + 4;
    for (const win of b.windows) {
      const wy = by + 28 + win.r * 18;
      if (wy + wh > GROUND_Y || win.r > 2) continue;
      ctx.fillStyle = isNight ? '#FFE4A1' : 'rgba(255,228,161,0.2)';
      ctx.fillRect(bx + padX + win.c * 16, wy, ww, wh);
    }

  } else if (zid === 'redlight') {
    // Dark building with neon accents
    ctx.fillStyle = b.color; ctx.fillRect(bx, by, b.w, b.h + 20);
    ctx.fillStyle = b.accent; ctx.fillRect(bx, by, b.w, 4);
    // Neon strips on facade
    const nc = b.neonColor || '#FF1493';
    for (let n = 0; n < (b.neonCount || 1); n++) {
      const ny = by + 8 + n * Math.floor(b.h / 4);
      ctx.fillStyle = nc; ctx.fillRect(bx + 4, ny, b.w - 8, 2);
      ctx.globalAlpha = 0.1; ctx.fillStyle = nc;
      ctx.fillRect(bx, ny - 4, b.w, 10);
      ctx.globalAlpha = 1;
    }
    // Windows
    const ww = 10, wh = 12, padX = (b.w - b.windowCols * 18) / 2 + 4, padY = 14;
    for (const win of b.windows) {
      const isLit = isNight ? win.nightLit : win.lit;
      ctx.fillStyle = isLit ? (isNight ? nc : 'rgba(255,100,180,0.2)') : (isNight ? '#1A0A14' : '#2A1530');
      ctx.fillRect(bx + padX + win.c * 18, by + padY + win.r * 22, ww, wh);
    }

  } else if (zid === 'industrial') {
    // Warehouse body
    ctx.fillStyle = b.color; ctx.fillRect(bx, by, b.w, b.h + 20);
    // Roof
    if (b.roofType === 'corrugated') {
      ctx.fillStyle = '#5A5A5A';
      ctx.fillRect(bx - 3, by - 4, b.w + 6, 8);
      // Corrugation lines
      ctx.strokeStyle = '#4A4A4A'; ctx.lineWidth = 1;
      for (let rx = 0; rx < b.w + 6; rx += 6) {
        ctx.beginPath(); ctx.moveTo(bx - 3 + rx, by - 4); ctx.lineTo(bx - 3 + rx, by + 4); ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#5A5A5A'; ctx.fillRect(bx, by, b.w, 4);
    }
    // Accent stripe (hazard-style)
    ctx.fillStyle = b.accent; ctx.fillRect(bx, by + 8, b.w, 4);
    // Large garage door
    if (b.hasDoor) {
      const dw = Math.min(b.w * 0.5, 60), dh = Math.min(b.h * 0.4, 60);
      const dx = bx + (b.w - dw) / 2, dy = GROUND_Y - dh;
      ctx.fillStyle = b.doorColor || '#4A4A4A'; ctx.fillRect(dx, dy, dw, dh + 5);
      // Door lines
      ctx.strokeStyle = '#3A3A3A'; ctx.lineWidth = 1;
      for (let dl = 0; dl < dh; dl += 8) {
        ctx.beginPath(); ctx.moveTo(dx, dy + dl); ctx.lineTo(dx + dw, dy + dl); ctx.stroke();
      }
    }
    // Small industrial windows (higher up)
    const ww = 10, wh = 8, padX = (b.w - b.windowCols * 18) / 2 + 4;
    for (const win of b.windows) {
      const wy = by + 16 + win.r * 22;
      if (wy > GROUND_Y - 70) continue;
      const isLit = isNight ? win.nightLit : win.lit;
      ctx.fillStyle = isLit ? (isNight ? '#FFD700' : 'rgba(255,215,0,0.25)') : (isNight ? '#1A1818' : WINDOW_OFF);
      ctx.fillRect(bx + padX + win.c * 18, wy, ww, wh);
    }

  } else if (zid === 'suburbs') {
    // House body
    ctx.fillStyle = b.color; ctx.fillRect(bx, by + 20, b.w, b.h - 20 + 20);
    // Triangle roof
    ctx.fillStyle = b.roofColor || b.accent;
    ctx.beginPath();
    ctx.moveTo(bx - 8, by + 22);
    ctx.lineTo(bx + b.w / 2, by - 10);
    ctx.lineTo(bx + b.w + 8, by + 22);
    ctx.closePath();
    ctx.fill();
    // Roof edge
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bx - 8, by + 22); ctx.lineTo(bx + b.w / 2, by - 10); ctx.lineTo(bx + b.w + 8, by + 22); ctx.stroke();
    // Door
    if (b.hasDoor) {
      const dw = 14, dh = 28;
      const dx = bx + b.w / 2 - dw / 2, dy = GROUND_Y - dh;
      ctx.fillStyle = b.doorColor || b.accent; ctx.fillRect(dx, dy, dw, dh + 5);
      // Doorknob
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.arc(dx + dw - 4, dy + dh / 2, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    // House windows
    const ww = 12, wh = 14;
    const padX = (b.w - b.windowCols * 20) / 2 + 4;
    for (const win of b.windows) {
      const wy = by + 28 + win.r * 24;
      if (wy + wh > GROUND_Y - 30) continue;
      const isLit = isNight ? win.nightLit : win.lit;
      ctx.fillStyle = isLit ? (isNight ? '#FFE4A1' : 'rgba(255,228,161,0.3)') : (isNight ? '#1A1818' : WINDOW_OFF);
      ctx.fillRect(bx + padX + win.c * 20, wy, ww, wh);
      // Window cross
      ctx.strokeStyle = b.color; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx + padX + win.c * 20 + ww / 2, wy);
      ctx.lineTo(bx + padX + win.c * 20 + ww / 2, wy + wh);
      ctx.moveTo(bx + padX + win.c * 20, wy + wh / 2);
      ctx.lineTo(bx + padX + win.c * 20 + ww, wy + wh / 2);
      ctx.stroke();
    }

  } else {
    // Downtown / default — classic skyscraper rectangles
    ctx.fillStyle = b.color; ctx.fillRect(bx, by, b.w, b.h + 20);
    ctx.fillStyle = b.accent; ctx.fillRect(bx, by, b.w, 4);
    const ww = 10, wh = 12, padX = (b.w - b.windowCols * 18) / 2 + 4, padY = 14;
    for (const win of b.windows) {
      const isLit = isNight ? win.nightLit : win.lit;
      ctx.fillStyle = isLit ? (isNight ? '#FFE4A1' : 'rgba(255,228,161,0.3)') : (isNight ? '#1A1818' : WINDOW_OFF);
      ctx.fillRect(bx + padX + win.c * 18, by + padY + win.r * 22, ww, wh);
    }
  }
}

function drawProp(p) {
  const px = p.x - cam.x;
  if (p.type === 'lamp') {
    ctx.fillStyle = '#4A5568'; ctx.fillRect(px - 2, GROUND_Y - 55, 4, 55);
    ctx.fillStyle = '#FFE4A1'; ctx.beginPath(); ctx.arc(px, GROUND_Y - 55, 6, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.08; ctx.beginPath(); ctx.arc(px, GROUND_Y - 55, 30, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
  } else if (p.type === 'hydrant') {
    ctx.fillStyle = '#E53E3E'; ctx.fillRect(px - 4, GROUND_Y - 14, 8, 14); ctx.fillRect(px - 6, GROUND_Y - 12, 12, 4); ctx.fillRect(px - 3, GROUND_Y - 16, 6, 4);
  } else if (p.type === 'bench') {
    ctx.fillStyle = '#8B6E4E'; ctx.fillRect(px - 15, GROUND_Y - 12, 30, 3); ctx.fillRect(px - 13, GROUND_Y - 12, 3, 12); ctx.fillRect(px + 10, GROUND_Y - 12, 3, 12);
    ctx.fillStyle = '#6B5840'; ctx.fillRect(px - 15, GROUND_Y - 22, 2, 13); ctx.fillRect(px + 13, GROUND_Y - 22, 2, 13); ctx.fillRect(px - 15, GROUND_Y - 22, 30, 3);
  } else if (p.type === 'sign') {
    // Shopping district store sign
    ctx.fillStyle = '#8B6E4E'; ctx.fillRect(px - 1, GROUND_Y - 40, 3, 40);
    ctx.fillStyle = '#E8D5B7'; ctx.fillRect(px - 12, GROUND_Y - 45, 25, 10);
    ctx.strokeStyle = '#8B6E4E'; ctx.lineWidth = 1; ctx.strokeRect(px - 12, GROUND_Y - 45, 25, 10);
  } else if (p.type === 'awning_pole') {
    // Awning support pole
    ctx.fillStyle = '#6B5840'; ctx.fillRect(px - 1.5, GROUND_Y - 50, 3, 50);
    ctx.fillStyle = '#C05621'; ctx.fillRect(px - 15, GROUND_Y - 52, 30, 5);
    ctx.fillStyle = '#DD6B20';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(px - 15 + i * 7.5, GROUND_Y - 47);
      ctx.lineTo(px - 11.25 + i * 7.5, GROUND_Y - 42);
      ctx.lineTo(px - 7.5 + i * 7.5, GROUND_Y - 47);
      ctx.fill();
    }
  } else if (p.type === 'tree') {
    // Park tree
    const tH = p.trunkH || 40;
    const cR = p.canopyR || 22;
    ctx.fillStyle = '#6B4E2A'; ctx.fillRect(px - 3, GROUND_Y - tH, 6, tH);
    ctx.fillStyle = p.canopyColor || '#2D8B4E';
    ctx.beginPath(); ctx.arc(px, GROUND_Y - tH - cR * 0.3, cR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px - cR * 0.5, GROUND_Y - tH + cR * 0.2, cR * 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + cR * 0.5, GROUND_Y - tH + cR * 0.15, cR * 0.65, 0, Math.PI * 2); ctx.fill();
  } else if (p.type === 'bush') {
    ctx.fillStyle = '#38A169';
    ctx.beginPath(); ctx.ellipse(px, GROUND_Y - 8, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2F855A';
    ctx.beginPath(); ctx.ellipse(px - 5, GROUND_Y - 6, 7, 6, 0, 0, Math.PI * 2); ctx.fill();
  } else if (p.type === 'fountain') {
    // Simple fountain
    ctx.fillStyle = '#9CA3AF'; ctx.fillRect(px - 18, GROUND_Y - 8, 36, 8);
    ctx.fillRect(px - 14, GROUND_Y - 12, 28, 4);
    ctx.fillStyle = '#63B3ED'; ctx.fillRect(px - 12, GROUND_Y - 10, 24, 2);
    ctx.fillStyle = '#90CDF4'; ctx.fillRect(px - 1, GROUND_Y - 24, 2, 14);
    // Water spray
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#63B3ED';
    ctx.beginPath(); ctx.arc(px, GROUND_Y - 24, 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (p.type === 'neon_sign') {
    const nc = p.neonColor || '#FF1493';
    const nw = p.neonW || 16;
    const nh = p.neonH || 8;
    ctx.fillStyle = '#2D2D2D'; ctx.fillRect(px - 1, GROUND_Y - 42, 3, 42);
    ctx.fillStyle = nc; ctx.fillRect(px - nw / 2, GROUND_Y - 46, nw, nh);
    ctx.globalAlpha = 0.15; ctx.fillStyle = nc;
    ctx.beginPath(); ctx.arc(px, GROUND_Y - 42, 20, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (p.type === 'pipe') {
    ctx.fillStyle = '#6B6B6B'; ctx.fillRect(px - 3, GROUND_Y - 25, 6, 25);
    ctx.fillStyle = '#8B8B8B'; ctx.fillRect(px - 5, GROUND_Y - 28, 10, 5);
    ctx.fillRect(px - 4, GROUND_Y - 3, 8, 3);
  } else if (p.type === 'barrel') {
    ctx.fillStyle = '#8B5A2B'; ctx.fillRect(px - 8, GROUND_Y - 18, 16, 18);
    ctx.fillStyle = '#6B4A1B'; ctx.fillRect(px - 9, GROUND_Y - 16, 18, 2);
    ctx.fillRect(px - 9, GROUND_Y - 6, 18, 2);
    ctx.fillStyle = '#A06A3B'; ctx.fillRect(px - 7, GROUND_Y - 18, 14, 2);
  } else if (p.type === 'smokestack_small') {
    ctx.fillStyle = '#5A5A5A'; ctx.fillRect(px - 4, GROUND_Y - 45, 8, 45);
    ctx.fillStyle = '#4A4A4A'; ctx.fillRect(px - 6, GROUND_Y - 48, 12, 5);
    // Smoke puff
    ctx.globalAlpha = 0.3; ctx.fillStyle = '#9CA3AF';
    ctx.beginPath(); ctx.arc(px + 3, GROUND_Y - 52, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 7, GROUND_Y - 58, 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (p.type === 'mailbox') {
    ctx.fillStyle = '#3182CE'; ctx.fillRect(px - 5, GROUND_Y - 20, 10, 12);
    ctx.beginPath(); ctx.arc(px, GROUND_Y - 20, 5, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2C5282'; ctx.fillRect(px - 2, GROUND_Y - 8, 4, 8);
  } else if (p.type === 'fence_segment') {
    const fw = p.fenceW || 40;
    ctx.fillStyle = '#E8D8C4';
    ctx.fillRect(px - fw / 2, GROUND_Y - 18, 3, 18);
    ctx.fillRect(px + fw / 2 - 3, GROUND_Y - 18, 3, 18);
    ctx.fillRect(px - fw / 2, GROUND_Y - 16, fw, 2);
    ctx.fillRect(px - fw / 2, GROUND_Y - 8, fw, 2);
    // Pickets
    for (let i = 0; i < fw; i += 8) {
      ctx.fillRect(px - fw / 2 + i, GROUND_Y - 20, 2, 20);
    }
  } else if (p.type === 'garden_bush') {
    const bc = p.bushColor || '#38A169';
    const br = p.bushR || 10;
    ctx.fillStyle = bc;
    ctx.beginPath(); ctx.ellipse(px, GROUND_Y - br * 0.7, br, br * 0.7, 0, 0, Math.PI * 2); ctx.fill();
    // Flowers
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath(); ctx.arc(px - br * 0.3, GROUND_Y - br, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(px + br * 0.3, GROUND_Y - br * 0.8, 2, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Cars ──
const ROAD_Y = GROUND_Y - 6;
const cars = [];
let carSpawnTimer = 0;
const CAR_DEFS = [
  { name:'sedan',  w:66, bodyH:15, cabH:12, cabInset:12, wheelR:6,   wheelIn:12, spdMin:80,  spdMax:160, wt:30 },
  { name:'suv',    w:75, bodyH:18, cabH:15, cabInset:9,  wheelR:7,   wheelIn:14, spdMin:60,  spdMax:130, wt:20 },
  { name:'sports', w:69, bodyH:12, cabH:9,  cabInset:18, wheelR:5.5, wheelIn:14, spdMin:160, spdMax:280, wt:10 },
  { name:'van',    w:69, bodyH:21, cabH:18, cabInset:5,  wheelR:7,   wheelIn:12, spdMin:50,  spdMax:90,  wt:12 },
  { name:'pickup', w:75, bodyH:15, cabH:14, cabInset:0,  wheelR:7,   wheelIn:14, spdMin:65,  spdMax:120, wt:15 },
  { name:'bus',    w:120,bodyH:21, cabH:21, cabInset:5,  wheelR:8,   wheelIn:18, spdMin:40,  spdMax:65,  wt:4  },
];
const CAR_COLORS = ['#C53030','#2B6CB0','#276749','#6B46C1','#C05621','#4A5568','#2D3748','#B7791F','#9B2C2C','#2C5282','#22543D','#553C9A','#C4B5FD','#1A365D','#F6E05E','#E2E8F0'];

function pickCarDef() {
  const total = CAR_DEFS.reduce((s, d) => s + d.wt, 0);
  let r = Math.random() * total;
  for (const d of CAR_DEFS) { r -= d.wt; if (r <= 0) return d; }
  return CAR_DEFS[0];
}

function spawnCar(fromLeft) {
  const def = pickCarDef();
  const dir = fromLeft ? 1 : -1;
  const color = def.name === 'bus'
    ? ['#D69E2E','#E53E3E','#2B6CB0'][randInt(0,2)]
    : CAR_COLORS[randInt(0, CAR_COLORS.length - 1)];
  cars.push({
    x: fromLeft ? cam.x - 100 - rand(0, 60) : cam.x + W + 100 + rand(0, 60),
    dir, speed: rand(def.spdMin, def.spdMax), def, color,
  });
}

function updateCars(dt) {
  for (let i = cars.length - 1; i >= 0; i--) {
    const c = cars[i];
    c.x += c.dir * c.speed * dt;
    const sx = c.x - cam.x;
    if (sx < -200 || sx > W + 200) { cars.splice(i, 1); }
  }
  carSpawnTimer -= dt;
  if (carSpawnTimer <= 0 && cars.length < 14) {
    spawnCar(Math.random() > 0.5);
    carSpawnTimer = rand(0.3, 1.0);
  }
}

function drawCar(car) {
  const sx = car.x - cam.x;
  if (sx < -100 || sx > W + 100) return;
  const d = car.def;
  ctx.save();
  ctx.translate(sx, ROAD_Y);
  if (car.dir < 0) ctx.scale(-1, 1);

  const bodyBot = -d.wheelR + 1;
  const bodyTop = bodyBot - d.bodyH;

  // Wheels
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath();
  ctx.arc(-d.w/2 + d.wheelIn, 0, d.wheelR, 0, Math.PI * 2);
  ctx.arc(d.w/2 - d.wheelIn, 0, d.wheelR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(-d.w/2 + d.wheelIn, 0, d.wheelR * 0.4, 0, Math.PI * 2);
  ctx.arc(d.w/2 - d.wheelIn, 0, d.wheelR * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = car.color;
  roundRect(ctx, -d.w/2, bodyTop, d.w, d.bodyH, 3);

  // Cabin
  if (d.name === 'pickup') {
    const cabW = d.w * 0.4;
    roundRect(ctx, d.w/2 - cabW - 2, bodyTop - d.cabH, cabW, d.cabH, 3);
    ctx.fillStyle = '#B8D4E8';
    ctx.fillRect(d.w/2 - cabW, bodyTop - d.cabH + 2, cabW - 4, d.cabH - 3);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(-d.w/2 + 2, bodyTop - 3, d.w * 0.52, 3);
  } else if (d.name === 'bus') {
    const cabW = d.w - 6;
    roundRect(ctx, -cabW/2, bodyTop - d.cabH, cabW, d.cabH, 2);
    ctx.fillStyle = '#B8D4E8';
    const nWins = Math.floor(cabW / 11);
    for (let i = 0; i < nWins; i++) {
      ctx.fillRect(-cabW/2 + 4 + i * 11, bodyTop - d.cabH + 3, 8, d.cabH - 5);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(-cabW/2, bodyTop - 1, cabW, 3);
  } else {
    const cabW = d.w - d.cabInset * 2;
    roundRect(ctx, -d.w/2 + d.cabInset, bodyTop - d.cabH, cabW, d.cabH, 3);
    ctx.fillStyle = '#B8D4E8';
    const winY = bodyTop - d.cabH + 2, winH = d.cabH - 3;
    ctx.fillRect(-d.w/2 + d.cabInset + 2, winY, cabW/2 - 4, winH);
    ctx.fillRect(-d.w/2 + d.cabInset + cabW/2 + 1, winY, cabW/2 - 3, winH);
  }

  // Headlights
  ctx.fillStyle = '#FFF9C4';
  ctx.fillRect(d.w/2 - 3, bodyTop + d.bodyH * 0.2, 3, 4);
  // Taillights
  ctx.fillStyle = '#E53E3E';
  ctx.fillRect(-d.w/2, bodyTop + d.bodyH * 0.3, 3, 5);

  ctx.restore();
}

const HAIR_STYLES = ['short','short','short','long','ponytail','mohawk','bun','spiky'];

// ── Character Drawing ──
const DESIGNER_PAYLOAD_INDEX_PATH = './data/npc_payloads/index.json';
const DESIGNER_PAYLOAD_POSES = Object.freeze({ normal: 'normal', panic: 'panic', ko: 'ko' });
const DESIGNER_PAYLOAD_REGISTRY = {
  status: 'idle',
  error: null,
  payloads: new Map(),
  indexEntries: [],
  loadPromise: null,
};

function toFiniteNumber(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function cloneJsonSafe(value, fallback = null) {
  try {
    return JSON.parse(JSON.stringify(value));
  } catch (_err) {
    return fallback;
  }
}

function normalizeDesignerLayer(layer) {
  if (!layer || typeof layer !== 'object') return null;
  const type = ['rect', 'ellipse', 'line', 'curve', 'polygon'].includes(layer.type) ? layer.type : null;
  if (!type || !layer.geometry || typeof layer.geometry !== 'object') return null;
  const styleSrc = (layer.style && typeof layer.style === 'object') ? layer.style : {};
  const normalized = {
    id: typeof layer.id === 'string' ? layer.id : '',
    name: typeof layer.name === 'string' ? layer.name : '',
    type,
    visible: layer.visible !== false,
    geometry: cloneJsonSafe(layer.geometry, {}),
    style: {
      fill: typeof styleSrc.fill === 'string' ? styleSrc.fill : '#3B82F6',
      stroke: typeof styleSrc.stroke === 'string' ? styleSrc.stroke : '#0F172A',
      strokeWidth: toFiniteNumber(styleSrc.strokeWidth, 0),
      opacity: toFiniteNumber(styleSrc.opacity, 1),
      fillMode: styleSrc.fillMode === 'gradient' ? 'gradient' : 'solid',
    },
  };
  if (normalized.style.fillMode === 'gradient' && styleSrc.gradient && typeof styleSrc.gradient === 'object') {
    normalized.style.gradient = {
      angle: toFiniteNumber(styleSrc.gradient.angle, 90),
      stops: Array.isArray(styleSrc.gradient.stops)
        ? styleSrc.gradient.stops
            .map(stop => ({
              offset: toFiniteNumber(stop && stop.offset, 0),
              color: typeof (stop && stop.color) === 'string' ? stop.color : '#FFFFFF',
            }))
            .filter(stop => Number.isFinite(stop.offset))
        : [],
    };
  }
  return normalized;
}

function normalizeDesignerPayload(rawPayload, entry = {}) {
  if (!rawPayload || typeof rawPayload !== 'object') return null;
  const payloadId = (
    (typeof rawPayload.id === 'string' && rawPayload.id.trim()) ||
    (typeof rawPayload.meta?.id === 'string' && rawPayload.meta.id.trim()) ||
    (typeof entry.id === 'string' && entry.id.trim()) ||
    ''
  );
  if (!payloadId) return null;

  const poseMap = {};
  for (const poseId of [DESIGNER_PAYLOAD_POSES.normal, DESIGNER_PAYLOAD_POSES.panic, DESIGNER_PAYLOAD_POSES.ko]) {
    const poseNode = rawPayload.poses && rawPayload.poses[poseId];
    const sourceLayers = Array.isArray(poseNode)
      ? poseNode
      : (poseNode && Array.isArray(poseNode.layers) ? poseNode.layers : []);
    poseMap[poseId] = sourceLayers.map(normalizeDesignerLayer).filter(Boolean);
  }

  const boundsSrc = rawPayload.bounds && typeof rawPayload.bounds === 'object' ? rawPayload.bounds : {};
  const originSrc = rawPayload.origin && typeof rawPayload.origin === 'object'
    ? rawPayload.origin
    : (rawPayload.metadata && rawPayload.metadata.origin && typeof rawPayload.metadata.origin === 'object'
      ? rawPayload.metadata.origin
      : {});

  return {
    id: payloadId,
    label: (typeof rawPayload.label === 'string' && rawPayload.label) || (typeof rawPayload.meta?.label === 'string' && rawPayload.meta.label) || payloadId,
    bounds: {
      w: toFiniteNumber(boundsSrc.w, 24),
      h: toFiniteNumber(boundsSrc.h, 46),
      editorScale: Math.max(0.001, toFiniteNumber(boundsSrc.editorScale, 3.2)),
    },
    origin: {
      centerX: toFiniteNumber(originSrc.centerX, toFiniteNumber(entry.designCenterX, 480)),
      baselineY: toFiniteNumber(originSrc.baselineY, toFiniteNumber(entry.designBaselineY, 430)),
    },
    poses: poseMap,
  };
}

function normalizePayloadIndexEntries(indexDoc) {
  const runtimeEntries = Array.isArray(indexDoc && indexDoc.runtimePayloads) ? indexDoc.runtimePayloads : null;
  const fixtureEntries = Array.isArray(indexDoc && indexDoc.fixtures)
    ? indexDoc.fixtures.filter(entry => entry && entry.expected !== 'fail-hard')
    : [];
  const sourceEntries = runtimeEntries && runtimeEntries.length ? runtimeEntries : fixtureEntries;
  return sourceEntries
    .map((entry) => {
      if (!entry || typeof entry !== 'object' || typeof entry.file !== 'string') return null;
      const trimmedFile = entry.file.trim();
      if (!trimmedFile) return null;
      return {
        id: typeof entry.id === 'string' ? entry.id.trim() : '',
        file: trimmedFile,
        designCenterX: toFiniteNumber(entry.designCenterX, 480),
        designBaselineY: toFiniteNumber(entry.designBaselineY, 430),
      };
    })
    .filter(Boolean);
}

async function loadDesignerPayloadRegistry() {
  if (DESIGNER_PAYLOAD_REGISTRY.loadPromise) return DESIGNER_PAYLOAD_REGISTRY.loadPromise;
  DESIGNER_PAYLOAD_REGISTRY.status = 'loading';
  DESIGNER_PAYLOAD_REGISTRY.error = null;
  DESIGNER_PAYLOAD_REGISTRY.loadPromise = (async () => {
    try {
      const payloadIndexURL = new URL(DESIGNER_PAYLOAD_INDEX_PATH, location.href);
      const indexRes = await fetch(DESIGNER_PAYLOAD_INDEX_PATH);
      if (!indexRes.ok) throw new Error(`Index fetch failed with status ${indexRes.status}`);
      const indexJson = await indexRes.json();
      const entries = normalizePayloadIndexEntries(indexJson);
      DESIGNER_PAYLOAD_REGISTRY.indexEntries = entries;
      const payloads = new Map();
      for (const entry of entries) {
        try {
          const payloadURL = new URL(entry.file, payloadIndexURL).toString();
          const payloadRes = await fetch(payloadURL);
          if (!payloadRes.ok) throw new Error(`Payload fetch failed with status ${payloadRes.status}`);
          const payloadJson = await payloadRes.json();
          const normalized = normalizeDesignerPayload(payloadJson, entry);
          if (!normalized) {
            console.warn(`[DesignerPayloadRegistry] Skipping invalid payload entry: ${entry.file}`);
            continue;
          }
          payloads.set(normalized.id, normalized);
          if (entry.id && !payloads.has(entry.id)) payloads.set(entry.id, normalized);
        } catch (err) {
          console.warn(`[DesignerPayloadRegistry] Failed loading payload "${entry.file}". Falling back for this entry.`, err);
        }
      }
      DESIGNER_PAYLOAD_REGISTRY.payloads = payloads;
      DESIGNER_PAYLOAD_REGISTRY.status = payloads.size > 0 ? 'ready' : 'empty';
    } catch (err) {
      DESIGNER_PAYLOAD_REGISTRY.payloads = new Map();
      DESIGNER_PAYLOAD_REGISTRY.status = 'failed';
      DESIGNER_PAYLOAD_REGISTRY.error = err;
      console.warn('[DesignerPayloadRegistry] Registry load failed. Legacy rendering remains active.', err);
    }
    return DESIGNER_PAYLOAD_REGISTRY;
  })();
  return DESIGNER_PAYLOAD_REGISTRY.loadPromise;
}

function resolveDesignerPayloadById(designerPayloadId) {
  if (typeof designerPayloadId !== 'string' || !designerPayloadId) return null;
  return DESIGNER_PAYLOAD_REGISTRY.payloads.get(designerPayloadId) || null;
}

function resolveDesignerPayloadPose(opts) {
  if (opts && opts.isKO) return DESIGNER_PAYLOAD_POSES.ko;
  if (opts && (opts.isFleeing || opts.state === 'fleeing' || opts.state === 'panicking')) return DESIGNER_PAYLOAD_POSES.panic;
  return DESIGNER_PAYLOAD_POSES.normal;
}

const SHARED_CHARACTER_RENDERER = window.NPCRenderShared && window.NPCRenderShared.createCharacterRenderer
  ? window.NPCRenderShared.createCharacterRenderer({ ctx, CHAR_BY_NAME, clamp, roundRect, hatImg })
  : null;

function drawCharacter(x, y, w, h, opts) {
  if (!SHARED_CHARACTER_RENDERER) {
    throw new Error("Shared NPC renderer unavailable");
  }
  const safeOpts = (opts && typeof opts === 'object') ? opts : {};
  const designerPayload = resolveDesignerPayloadById(safeOpts.designerPayloadId);
  if (designerPayload) {
    SHARED_CHARACTER_RENDERER.drawCharacter(x, y, w, h, {
      ...safeOpts,
      designerPayload,
      designerPose: resolveDesignerPayloadPose(safeOpts),
    });
    return;
  }
  SHARED_CHARACTER_RENDERER.drawCharacter(x, y, w, h, safeOpts);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath(); ctx.fill();
}
