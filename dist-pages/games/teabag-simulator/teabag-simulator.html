function drawGalleryCompanionDog(ownerW, opts) {
  if (opts.npcType !== 'dog_walker' || opts.isKO) return;
  const facing = opts.facing || 1;
  const gait = Math.sin(opts.walkPhase || 0);
  const bodyBobY = -Math.abs(gait) * 1.1;
  const groundY = 0;
  const dogX = -facing * (ownerW * 0.95 + 8) + facing * gait * 0.45;
  const dogY = bodyBobY;
  const legLiftA = Math.max(0, gait) * 1.4;
  const legLiftB = Math.max(0, -gait) * 1.4;
  const d = GALLERY_DOG_PREVIEW;
  const handX = facing * (ownerW * 0.46);
  const handY = -24;
  const collarX = dogX + 4.1;
  const collarY = -8.2 + dogY;
  const leashDX = collarX - handX;
  const leashDY = collarY - handY;
  const leashDist = Math.hypot(leashDX, leashDY);
  const leashSlack = Math.max(1.2, Math.min(4.3, leashDist * 0.15));
  const leashCtrlX = handX + leashDX * 0.52 + facing * Math.max(0.5, Math.min(2.8, leashDist * 0.08));
  const leashCtrlY = (handY + collarY) * 0.5 + leashSlack;

  // Leash from owner's hand to collar.
  ctx.strokeStyle = '#8B8B8B'; ctx.lineWidth = 0.55;
  ctx.beginPath();
  ctx.moveTo(handX, handY);
  ctx.quadraticCurveTo(leashCtrlX, leashCtrlY, collarX, collarY);
  ctx.stroke();

  // Ground shadow.
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(dogX, groundY + 1.7, 5.4, 1.2, 0, 0, Math.PI * 2); ctx.fill();

  // Legs (paws stay planted on the same ground line as the owner).
  ctx.fillStyle = d.bodyColor;
  const rearOuterTop = -6 + legLiftA + dogY;
  const rearInnerTop = -6 + legLiftB + dogY;
  const frontInnerTop = -6 + legLiftB * 0.9 + dogY;
  const frontOuterTop = -6 + legLiftA * 0.85 + dogY;
  ctx.fillRect(dogX - 3.9, rearOuterTop, 1.2, groundY - rearOuterTop);
  ctx.fillRect(dogX - 1.9, rearInnerTop, 1.2, groundY - rearInnerTop);
  ctx.fillRect(dogX + 0.6, frontInnerTop, 1.2, groundY - frontInnerTop);
  ctx.fillRect(dogX + 2.8, frontOuterTop, 1.2, groundY - frontOuterTop);

  // Body + patch.
  ctx.fillStyle = d.bodyColor;
  roundRect(ctx, dogX - 4.6, -12 + dogY, 9.2, 5.1, 1.6);
  ctx.fillStyle = d.patchColor;
  roundRect(ctx, dogX - 0.8, -10.8 + dogY, 3.5, 2.5, 1.2);

  // Head.
  ctx.fillStyle = d.bodyColor;
  ctx.beginPath(); ctx.arc(dogX + 4.6, -9 + dogY, 2.1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = d.patchColor;
  ctx.beginPath(); ctx.ellipse(dogX + 5.5, -8.4 + dogY, 1.3, 1.0, 0, 0, Math.PI * 2); ctx.fill();

  // Ears.
  ctx.fillStyle = d.earColor;
  ctx.beginPath();
  ctx.moveTo(dogX + 3.8, -10.6 + dogY);
  ctx.lineTo(dogX + 3.2, -12.7 + dogY);
  ctx.lineTo(dogX + 4.5, -11.5 + dogY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(dogX + 5.1, -10.8 + dogY);
  ctx.lineTo(dogX + 6.2, -12.4 + dogY);
  ctx.lineTo(dogX + 6.0, -10.8 + dogY);
  ctx.closePath();
  ctx.fill();

  // Collar + face.
  ctx.strokeStyle = d.collarColor; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.arc(collarX, collarY, 1.4, -1.2, 0.8); ctx.stroke();
  ctx.fillStyle = '#1A1A1A';
  ctx.fillRect(dogX + 5.6, -9.2 + dogY, 0.55, 0.55);
  ctx.fillRect(dogX + 6.1, -8.2 + dogY, 0.7, 0.5);

  // Tail wag.
  ctx.strokeStyle = d.earColor; ctx.lineWidth = 0.95;
  ctx.beginPath();
  ctx.moveTo(dogX - 4.6, -9.3 + dogY);
  ctx.quadraticCurveTo(dogX - 6.4, -10.6 + dogY + gait * 0.55, dogX - 5.3, -7.8 + dogY);
  ctx.stroke();
}

function drawGallery() {
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.fillStyle = '#1A1A1A';
  for (let gx = 0; gx < W; gx += 20) ctx.fillRect(gx, 0, 1, H);
  for (let gy = 0; gy < H; gy += 20) ctx.fillRect(0, gy, W, 1);
  // Center crosshair
  ctx.fillStyle = '#333';
  ctx.fillRect(W/2, 0, 1, H); ctx.fillRect(0, H * 0.65, W, 1);

  const gt = GALLERY_TYPES[galleryIndex];
  const t = performance.now() / 1000;
  const scale = 6;
  const baseY = H * 0.65;

  // Title
  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(22 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText(gt.label.toUpperCase(), W / 2, 40);
  ctx.fillStyle = '#666'; ctx.font = `${Math.round(13 * UI_S)}px monospace`;
  ctx.fillText(`${galleryIndex + 1} / ${GALLERY_TYPES.length}  \u2022  ${gt.w}\u00d7${gt.h}px`, W / 2, 58);
  if (gt.opts.npcType) {
    ctx.fillStyle = '#888'; ctx.fillText(`type: ${gt.opts.npcType}`, W / 2, 74);
  }

  // Standing (left)
  const gf = galleryFlip;
  ctx.fillStyle = '#444'; ctx.font = `${Math.round(10 * UI_S)}px monospace`;
  ctx.fillText('IDLE', W * 0.22, baseY + 30);
  ctx.save(); ctx.translate(W * 0.22, baseY); ctx.scale(scale, scale);
  const idleOpts = {
    ...gt.opts, facing: gf, breathing: Math.sin(t * 2) * 1, blinkTimer: 3,
  };
  drawCharacter(0, 0, gt.w, gt.h, idleOpts);
  drawGalleryCompanionDog(gt.w, idleOpts);
  ctx.restore();

  // Walking (center-left)
  ctx.fillStyle = '#444'; ctx.fillText('WALK', W * 0.40, baseY + 30);
  ctx.save(); ctx.translate(W * 0.40, baseY); ctx.scale(scale, scale);
  const walkOpts = {
    ...gt.opts, facing: gf, walkPhase: t * 4, breathing: Math.sin(t * 2) * 1, blinkTimer: 3,
  };
  drawCharacter(0, 0, gt.w, gt.h, walkOpts);
  drawGalleryCompanionDog(gt.w, walkOpts);
  ctx.restore();

  // Panic (center-right)
  ctx.fillStyle = '#444'; ctx.fillText('PANIC', W * 0.58, baseY + 30);
  ctx.save(); ctx.translate(W * 0.58, baseY); ctx.scale(scale, scale);
  const panicOpts = {
    ...gt.opts, facing: -gf, walkPhase: t * 6, breathing: Math.sin(t * 3) * 1, blinkTimer: 3, isFleeing: true,
  };
  drawCharacter(0, 0, gt.w, gt.h, panicOpts);
  drawGalleryCompanionDog(gt.w, panicOpts);
  ctx.restore();

  // KO (right)
  ctx.fillStyle = '#444'; ctx.fillText('K.O.', W * 0.78, baseY + 30);
  ctx.save(); ctx.translate(W * 0.78, baseY); ctx.scale(scale, scale);
  drawCharacter(0, 0, gt.w, gt.h, {
    ...gt.opts, facing: gf, isKO: true, blinkTimer: 3,
  });
  ctx.restore();

  // Nav arrows
  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(28 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('\u25C0', 30 + HUD_INSET, H / 2);
  ctx.fillText('\u25B6', W - 30 - HUD_INSET, H / 2);

  // Controls
  const galCtrlW = Math.round(400 * UI_S);
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; roundRect(ctx, W/2 - galCtrlW/2, H - Math.round(28 * UI_S), galCtrlW, Math.round(22 * UI_S), 4);
  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(11 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('A/D or \u2190/\u2192 to browse  \u2022  F to flip  \u2022  TAB to return', W / 2, H - Math.round(13 * UI_S));
}

const npcs = [];
function npcVisualOpts(npc) {
  return { facing: npc.facing, color: npc.color, skinColor: npc.skinColor, hairColor: npc.hairColor, npcType: npc.npcType, hairStyle: npc.hairStyle, eyeColor: npc.eyeColor, legColor: npc.legColor, shoeColor: npc.shoeColor, opacity: npc.fleeOpacity, feminineBody: npc.feminineBody, bustScale: npc.bustScale, hasDress: npc.hasDress, shortDress: npc.shortDress, designerPayloadId: npc.designerPayloadId };
}
const NPC_COLORS = ['#E53E3E','#DD6B20','#D69E2E','#38A169','#3182CE','#805AD5','#D53F8C','#319795'];
const HAIR_COLORS = ['#3D2B1F','#1A1A2E','#8B4513','#DAA520','#C0392B','#2C3E50'];
const SKIN_COLORS = ['#FBBF6B','#F0C8A0','#D4956B','#C68642','#8D5524','#FFDBAC'];

function pickNPCType(zone) {
  const pool = zone ? zone.npcPool : null;
  const poolDefs = pool
    ? pool.map(name => CHAR_BY_NAME[name]).filter(Boolean)
    : CHARACTER_DEFS.filter(d => d.spawnWeight > 0);
  const weighted = poolDefs.map(d => ({
    def: d,
    weight: d.spawnWeight > 0 ? d.spawnWeight : (d.isBig || d.isSpecial ? 8 : 15),
  }));
  const totalWeight = weighted.reduce((s, w) => s + w.weight, 0);
  let r = Math.random() * totalWeight;
  for (const w of weighted) { r -= w.weight; if (r <= 0) return w.def; }
  return weighted[0].def;
}

function spawnNPC(x) {
  const zone = getZoneAtX(x).zone;
  const def = pickNPCType(zone);
  let color, hairColor, skinColor, hairStyle, eyeColor, legColor, shoeColor;
  if (def.randomizeVisuals) {
    color = NPC_COLORS[randInt(0, NPC_COLORS.length - 1)];
    hairColor = HAIR_COLORS[randInt(0, HAIR_COLORS.length - 1)];
    skinColor = SKIN_COLORS[randInt(0, SKIN_COLORS.length - 1)];
    hairStyle = HAIR_STYLES[randInt(0, HAIR_STYLES.length - 1)];
    eyeColor = undefined; legColor = undefined; shoeColor = undefined;
  } else {
    color = def.color; hairColor = def.hairColor; skinColor = def.skinColor;
    hairStyle = def.hairStyle;
    eyeColor = def.eyeColor || undefined;
    legColor = def.legColor || undefined;
    shoeColor = def.shoeColor || undefined;
  }
  const dir = Math.random() > 0.5 ? 1 : -1;
  const hp = Math.round(randInt(def.healthMin, def.healthMax) * (1 + prestigeLevel * 0.5));
  // Feminine body: always for types with feminineBody flag, 50% for non-small pedestrians
  let isFeminine = !!def.feminineBody;
  let bustSz = def.bustScale || 0.85;
  if (!isFeminine && def.randomizeVisuals && def.name !== 'small' && Math.random() < 0.5) {
    isFeminine = true;
    bustSz = 0.85;
    // Give feminine pedestrians longer hair styles
    hairStyle = ['long','ponytail','bun'][randInt(0, 2)];
  }
  const hasDress = !!def.hasDress;
  const shortDress = !!def.shortDress;
  npcs.push({
    x, y: GROUND_Y,
    vx: dir * rand(20, def.isBig ? 40 : def.isSpecial ? 50 : 60),
    w: Math.round(BASE_W * def.wScale),
    h: Math.round(BASE_H * def.hScale),
    color, hairColor, skinColor, hairStyle, eyeColor, legColor, shoeColor,
    facing: dir,
    state: 'walking',
    health: hp, maxHealth: hp,
    koTimer: 0, fleeOpacity: 1,
    walkPhase: rand(0, Math.PI * 2), breathPhase: rand(0, Math.PI * 2), blinkTimer: rand(1, 4),
    panicDir: 1, panicTimer: 0,
    panicSpeed: def.isBig ? rand(80, 130) : def.isSpecial ? rand(100, 180) : rand(120, 220),
    npcType: def.name,
    calmTimer: 0,
    feminineBody: isFeminine,
    bustScale: bustSz,
    hasDress: hasDress,
    shortDress: shortDress,
  });
}

function startGame(gameCtx) {
  const wt = TUNING.world;
  initZoneLayout();
  generateSilhouettes();
  // Reset everything
  player.x = gameCtx.state.gameMode === 'campaign'
    ? zoneLayout[0].startX + wt.startXOffsetCampaign
    : wt.startXOffsetEndless;
  player.y = GROUND_Y; player.vx = 0; player.vy = 0;
  player.facing = 1; player.onGround = false; player.isCrouching = false;
  player.isSprinting = false; player.wasSprinting = false;
  player.walkPhase = 0; player.breathPhase = 0; player.blinkTimer = 2; player.squashX = 1;
  player.coyoteTimer = 0; player.jumpBuffer = 0; player.mountedNPC = null;
  player.lastCrouchTime = 0; player.crouchCycleActive = false; player.combo = 0; player.comboTimer = 0;
  player.onPlatform = null; player.dropThrough = false; player.dropFromY = 0; player.prevY = GROUND_Y;
  player.jumpCount = 0; player.chainCombo = 0; player.chainTimer = 0; player.onRealGround = false;
  npcs.length = 0; buildings.length = 0; bgBuildings.length = 0;
  props.length = 0; platforms.length = 0; cars.length = 0;
  particles.length = 0; popups.length = 0;
  clearMatterFX();
  gameCtx.state.score = 0; gameCtx.state.totalKOs = 0; gameCtx.state.centerKO = null;
  for (const d of CHARACTER_DEFS) koTracker[d.name] = 0;
  const startX = player.x;
  cityGenRight = startX - wt.bootstrapGenSeedPad; cityGenLeft = startX - wt.bootstrapGenSeedPad;
  bgGenRight = startX - wt.bootstrapGenSeedPad; bgGenLeft = startX - wt.bootstrapGenSeedPad;
  platGenRight = startX - wt.bootstrapGenSeedPad; platGenLeft = startX - wt.bootstrapGenSeedPad;
  if (cam.sprintTween) cam.sprintTween.kill();
  cam.sprintTween = null;
  cam.sprintTight = false;
  cam.leadFactor = wt.cameraLeadFactor;
  cam.followLerp = wt.cameraFollowLerp;
  cam.zoom = wt.cameraZoom;
  cam.forwardLookAhead = wt.cameraForwardLookAhead;
  cam.handheldPhase = 0;
  cam.handheldX = 0;
  cam.handheldY = 0;
  cam.x = startX - W * cam.leadFactor; cam.targetX = cam.x;
  gameCtx.state.currentZone = getZoneAtX(startX).zone;
  gameCtx.state.currentZoneIndex = getZoneAtX(startX).index;
  generateCity(cam.x - wt.bootstrapGenerationMargin, cam.x + W + wt.bootstrapGenerationMargin);
  generatePlatforms(cam.x - wt.bootstrapGenerationMargin, cam.x + W + wt.bootstrapGenerationMargin);
  for (let i = 0; i < wt.bootstrapNPCCount; i++) {
    spawnNPC(startX + rand(-wt.bootstrapNPCSpawnBack, wt.bootstrapNPCSpawnAhead));
  }
  for (let i = 0; i < wt.bootstrapCarCount; i++) {
    const def = pickCarDef();
    const dir = Math.random() > 0.5 ? 1 : -1;
    const color = def.name === 'bus' ? ['#D69E2E','#E53E3E','#2B6CB0'][randInt(0,2)] : CAR_COLORS[randInt(0, CAR_COLORS.length - 1)];
    cars.push({
      x: startX + rand(-wt.bootstrapCarSpawnBack, W + wt.bootstrapCarSpawnAhead),
      dir,
      speed: rand(def.spdMin, def.spdMax),
      def,
      color,
    });
  }
  gameCtx.state.dayTime = wt.startDayTime;
  gameCtx.state.gameState = 'playing';
}

function triggerPrestige(gameCtx) {
  const wt = TUNING.world;
  gameCtx.state.prestigeLevel++;
  if (gameCtx.state.prestigeLevel > gameCtx.state.bestPrestige) gameCtx.state.bestPrestige = gameCtx.state.prestigeLevel;
  // Unlock all zones for endless
  for (const z of ZONES) {
    if (!gameCtx.state.unlockedZones.includes(z.id)) gameCtx.state.unlockedZones.push(z.id);
  }
  gameCtx.services.saveProgress();
  // Rebuild zone layout from current position
  zoneLayout = [];
  let x = player.x;
  for (const zone of ZONES) {
    zoneLayout.push({ zoneId: zone.id, startX: x, endX: x + zone.width });
    x += zone.width;
  }
  gameCtx.state.currentZoneIndex = 0;
  gameCtx.state.currentZone = ZONES[0];
  // Clear old world geometry so new zones generate fresh
  buildings.length = 0; bgBuildings.length = 0;
  props.length = 0; platforms.length = 0;
  const startX = player.x;
  cityGenRight = startX - wt.bootstrapGenSeedPad; cityGenLeft = startX - wt.bootstrapGenSeedPad;
  bgGenRight = startX - wt.bootstrapGenSeedPad; bgGenLeft = startX - wt.bootstrapGenSeedPad;
  platGenRight = startX - wt.bootstrapGenSeedPad; platGenLeft = startX - wt.bootstrapGenSeedPad;
  generateCity(cam.x - wt.bootstrapGenerationMargin, cam.x + W + wt.bootstrapGenerationMargin);
  generatePlatforms(cam.x - wt.bootstrapGenerationMargin, cam.x + W + wt.bootstrapGenerationMargin);
  generateSilhouettes();
  gameCtx.services.playSFX('prestige');
  gameCtx.state.centerKO = { text: `PRESTIGE ${gameCtx.state.prestigeLevel}!`, color: '#FFD700', timer: wt.prestigeAnnouncementDuration };
  addShake(wt.prestigeShakeAmount, wt.prestigeShakeDuration);
  spawnStars(player.x, player.y - wt.prestigeStarsYOffset, wt.prestigeStarsCount);
}

function updateTitleMenuState(gameCtx, dt) {
  gameCtx.state.titleBlink += dt;
  if (Object.values(gameCtx.input.keys).some(v => v) || gameCtx.input.touch.jumpJust) gameCtx.state.gameState = 'modeselect';
}

function updateModeSelectState(gameCtx) {
  if (wasPressed('W') || wasPressed('S') || gameCtx.input.touch.upJust || gameCtx.input.touch.downJust) {
    gameCtx.state.menuSelection = gameCtx.state.menuSelection === 0 ? 1 : 0;
    gameCtx.services.playSFX('menuNav');
  }
  if (gameCtx.input.justPressed['Enter'] || gameCtx.input.justPressed['Space'] || wasPressed('D') || gameCtx.input.touch.jumpJust) {
    gameCtx.services.playSFX('menuSelect');
    if (gameCtx.state.menuSelection === 0) {
      gameCtx.state.gameMode = 'campaign';
      gameCtx.state.prestigeLevel = 0;
      startGame(gameCtx);
    } else {
      gameCtx.state.gameMode = 'endless';
      gameCtx.state.zonePickerIndex = 0;
      gameCtx.state.gameState = 'zonepicker';
    }
  }
}

function updateZonePickerState(gameCtx) {
  if (wasPressed('A') || gameCtx.input.touch.leftJust) {
    gameCtx.state.zonePickerIndex = (gameCtx.state.zonePickerIndex - 1 + ZONES.length) % ZONES.length;
    gameCtx.services.playSFX('menuNav');
  }
  if (wasPressed('D') || gameCtx.input.touch.rightJust) {
    gameCtx.state.zonePickerIndex = (gameCtx.state.zonePickerIndex + 1) % ZONES.length;
    gameCtx.services.playSFX('menuNav');
  }
  if (gameCtx.input.justPressed['Enter'] || gameCtx.input.justPressed['Space'] || gameCtx.input.touch.jumpJust) {
    const zone = ZONES[gameCtx.state.zonePickerIndex];
    if (gameCtx.state.unlockedZones.includes(zone.id)) {
      gameCtx.services.playSFX('menuSelect');
      gameCtx.state.endlessZoneId = zone.id;
      startGame(gameCtx);
    }
  }
  if (gameCtx.input.justPressed['Escape'] || gameCtx.input.touch.bagJust) {
    gameCtx.state.gameState = 'modeselect';
  }
}

function updateMenuState(gameCtx, dt) {
  if (gameCtx.state.gameState === 'title') {
    updateTitleMenuState(gameCtx, dt);
    return true;
  }

  if (gameCtx.state.gameState === 'modeselect') {
    updateModeSelectState(gameCtx);
    return true;
  }

  if (gameCtx.state.gameState === 'zonepicker') {
    updateZonePickerState(gameCtx);
    return true;
  }

  return false;
}

function updatePauseNavigation(gameCtx) {
  if (wasPressed('W') || gameCtx.input.touch.upJust) {
    gameCtx.state.pauseSelection = (gameCtx.state.pauseSelection + 4 - 1) % 4;
    gameCtx.services.playSFX('menuNav');
  }
  if (wasPressed('S') || gameCtx.input.touch.downJust) {
    gameCtx.state.pauseSelection = (gameCtx.state.pauseSelection + 1) % 4;
    gameCtx.services.playSFX('menuNav');
  }
}

function updatePauseSelectionAction(gameCtx) {
  if (gameCtx.input.justPressed['Escape'] || gameCtx.input.justPressed['KeyP'] || gameCtx.input.touch.pauseJust || gameCtx.input.touch.bagJust) {
    gameCtx.state.gameState = 'playing';
  }
  if (gameCtx.input.justPressed['Enter'] || gameCtx.input.justPressed['Space'] || gameCtx.input.touch.jumpJust) {
    if (gameCtx.state.pauseSelection === 0) { gameCtx.services.playSFX('menuSelect'); gameCtx.state.gameState = 'playing'; }
    else if (gameCtx.state.pauseSelection === 1) { // SFX Vol down/toggle mute
      gameCtx.state.sfxMuted = !gameCtx.state.sfxMuted; gameCtx.services.saveSFXSettings(); gameCtx.services.playSFX('menuSelect');
    }
    else if (gameCtx.state.pauseSelection === 2) { gameCtx.services.playSFX('menuSelect'); } // test volume
    else if (gameCtx.state.pauseSelection === 3) { gameCtx.services.playSFX('menuSelect'); gameCtx.state.gameState = 'modeselect'; gameCtx.state.menuSelection = 0; }
  }
}

function updatePauseAdjustments(gameCtx) {
  // Left/Right adjusts volume on SFX row
  if (gameCtx.state.pauseSelection === 1 || gameCtx.state.pauseSelection === 2) {
    if (wasPressed('A') || gameCtx.input.touch.leftJust) {
      if (gameCtx.state.pauseSelection === 1) { gameCtx.state.sfxMuted = !gameCtx.state.sfxMuted; gameCtx.services.saveSFXSettings(); gameCtx.services.playSFX('menuNav'); }
      if (gameCtx.state.pauseSelection === 2) { gameCtx.state.sfxVolume = Math.max(0, gameCtx.state.sfxVolume - 0.1); gameCtx.services.saveSFXSettings(); gameCtx.services.playSFX('menuNav'); }
    }
    if (wasPressed('D') || gameCtx.input.touch.rightJust) {
      if (gameCtx.state.pauseSelection === 1) { gameCtx.state.sfxMuted = !gameCtx.state.sfxMuted; gameCtx.services.saveSFXSettings(); gameCtx.services.playSFX('menuNav'); }
      if (gameCtx.state.pauseSelection === 2) { gameCtx.state.sfxVolume = Math.min(1, gameCtx.state.sfxVolume + 0.1); gameCtx.services.saveSFXSettings(); gameCtx.services.playSFX('menuNav'); }
    }
  }
}

function updatePauseState(gameCtx) {
  if (gameCtx.state.gameState !== 'paused') return false;

  updatePauseNavigation(gameCtx);
  updatePauseSelectionAction(gameCtx);
  updatePauseAdjustments(gameCtx);
  return true;
}

function updatePlayerMovementAndJump(dt, p, onNPC) {
  const mt = TUNING.movement;
  // Sprint — preserve momentum in air if we were sprinting at takeoff
  const wantsSprint = sprintDown() && !onNPC && !p.isCrouching;
  p.isSprinting = wantsSprint && p.onGround;
  if (p.isSprinting) p.wasSprinting = true;
  if (p.onGround && !p.isSprinting) p.wasSprinting = false;
  const airSprint = !p.onGround && p.wasSprinting && wantsSprint;
  const maxSpeed = (p.isSprinting || airSprint) ? PLAYER_SPEED * SPRINT_MULT : PLAYER_SPEED;

  // Horizontal
  if (!onNPC) {
    let moveDir = 0;
    if (isDown('A') || touch.left) moveDir -= 1;
    if (isDown('D') || touch.right) moveDir += 1;
    if (moveDir !== 0) {
      p.facing = moveDir;
      p.vx += moveDir * (p.onGround ? ACCEL : AIR_ACCEL) * dt;
      p.vx = clamp(p.vx, -maxSpeed, maxSpeed);
    } else {
      const dec = p.onGround ? DECEL : AIR_ACCEL * mt.airDecelFactor;
      if (p.vx > 0) p.vx = Math.max(0, p.vx - dec * dt);
      else if (p.vx < 0) p.vx = Math.min(0, p.vx + dec * dt);
    }
    p.vx = clamp(p.vx, -maxSpeed, maxSpeed);
  }

  // Crouch
  const wasCrouching = p.isCrouching;
  p.isCrouching = crouchDown() && (p.onGround || onNPC);

  // Drop through platform on crouch press (only one platform)
  if (p.isCrouching && !wasCrouching && p.onPlatform && !onNPC) {
    p.dropFromY = p.onPlatform.y;
    p.dropThrough = true;
    p.onGround = false;
    p.onPlatform = null;
    p.y += mt.dropThroughNudge; // nudge below platform
  }

  // Coyote time
  if (p.onGround) p.coyoteTimer = COYOTE_TIME;
  else p.coyoteTimer = Math.max(0, p.coyoteTimer - dt);

  // Jump buffer
  if (jumpJustPressed()) p.jumpBuffer = JUMP_BUFFER;
  else p.jumpBuffer = Math.max(0, p.jumpBuffer - dt);

  // Jump (supports double jump)
  if (p.jumpBuffer > 0 && (p.coyoteTimer > 0 || onNPC || p.jumpCount < mt.maxAirJumps)) {
    const isDoubleJump = !p.onGround && !onNPC && p.jumpCount >= 1;
    if (onNPC) {
      p.mountedNPC.state = p.mountedNPC.health > 0 ? 'panicking' : 'ko';
      p.mountedNPC = null;
    }
    const sprintBoost = p.isSprinting ? mt.sprintJumpBoost : 1.0;
    p.vy = (isDoubleJump ? JUMP_FORCE * mt.doubleJumpForceMult : JUMP_FORCE) * sprintBoost;
    p.onGround = false;
    p.onPlatform = null;
    p.onRealGround = false;
    p.coyoteTimer = 0;
    p.jumpBuffer = 0;
    p.jumpCount++;
    p.squashX = isDoubleJump ? mt.doubleJumpSquash : mt.jumpSquash;
    p.dropThrough = false;
    if (isDoubleJump) {
      playSFX('doubleJump');
      // Double jump puff — ring of dust at feet
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        particles.push({ x: p.x + Math.cos(a) * 8, y: p.y + Math.sin(a) * 4, vx: Math.cos(a) * 60, vy: Math.sin(a) * 30 - 40, life: 0.25, maxLife: 0.25, size: rand(2, 4), color: '#ddd' });
      }
    } else {
      playSFX('jump');
      spawnDust(p.x, p.y, 5, '#aaa');
    }
  }

  // Variable jump height
  if (!jumpPressed() && p.vy < mt.variableJumpCutoffVy) p.vy *= mt.variableJumpDamp;

  // Physics (not mounted)
  if (!onNPC) {
    p.vy += GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Platform collision (one-way, Smash Bros style) — uses feet offset so character stands ON platform
    p.onPlatform = null;
    if (p.vy >= 0 && !p.dropThrough) {
      for (const plat of platforms) {
        const platLeft = plat.x - 4, platRight = plat.x + plat.w + 4;
        const footY = p.y + PLAT_FEET_OFFSET;
        const prevFootY = p.prevY + PLAT_FEET_OFFSET;
        if (p.x > platLeft && p.x < platRight &&
            prevFootY <= plat.y && footY >= plat.y) {
          p.y = plat.y - PLAT_FEET_OFFSET;
          p.vy = 0;
          p.onGround = true;
          p.onPlatform = plat;
          p.jumpCount = 0;
          p.onRealGround = false;
          if (prevFootY < plat.y - 2) {
            spawnDust(p.x, plat.y, 2, '#aaa');
            p.squashX = mt.platformLandSquash;
          }
          break;
        }
      }
    }

    // Clear drop-through after clearing the dropped-from platform (land on next one)
    if (p.dropThrough && p.y + PLAT_FEET_OFFSET > p.dropFromY + mt.dropThroughClearance) p.dropThrough = false;
    // Reset drop-through when moving upward
    if (p.vy < 0) p.dropThrough = false;

    // Ground collision
    if (p.y >= GROUND_Y) {
      if (p.vy > mt.hardLandSpeedThreshold) { playSFX('land'); spawnDust(p.x, GROUND_Y, 4, '#aaa'); p.squashX = mt.hardLandSquash; }
      p.y = GROUND_Y; p.vy = 0; p.onGround = true; p.dropThrough = false; p.jumpCount = 0;
      p.onRealGround = true;
      p.combo = 0; p.comboTimer = 0;
    } else if (!p.onPlatform) {
      p.onGround = false;
    }
  }
}

function updateMountedCombatState(p) {
  const ct = TUNING.combat;
  // Mounted on NPC
  if (p.mountedNPC) {
    const npc = p.mountedNPC;
    if (npc.state === 'ko' || npc.state === 'fleeing' || npc.state === 'gone') {
      p.mountedNPC = null; p.vy = ct.mountBreakawayVy;
    } else {
      // Feet on top of NPC head — y is foot position, npc.y - npc.h is head top
      p.x = npc.x;
      p.y = npc.y - npc.h + 2;
      p.vx = 0;
      p.onGround = true;

      // Teabag mechanic
      if (p.isCrouching && !p.crouchCycleActive) {
        p.crouchCycleActive = true;
        p.lastCrouchTime = performance.now() / 1000;
      }
      if (!p.isCrouching && p.crouchCycleActive) {
        p.crouchCycleActive = false;
        const elapsed = performance.now() / 1000 - p.lastCrouchTime;
        if (elapsed < TEABAG_WINDOW) {
          p.combo++;
          p.comboTimer = ct.comboTimerSeconds;
          const dmg = TEABAG_DAMAGE + p.combo * ct.comboDamageStep;
          npc.health = Math.max(0, npc.health - dmg);
          playSFX('teabagHit');
          spawnImpact(npc.x, npc.y - npc.h);
          addShake(ct.comboHitShakeBase + p.combo * ct.comboHitShakePerCombo, ct.comboHitShakeDuration);
          spawnPopup(npc.x, npc.y - npc.h - 20, `-${dmg}`, '#FF6B6B');
          if (p.combo > 1) spawnPopup(npc.x, npc.y - npc.h - 40, `${p.combo}x COMBO`, '#FFD700');
          if (npc.health <= 0) {
            playSFX('ko');
            npc.state = 'ko'; npc.koTimer = KO_DURATION;
            p.mountedNPC = null; p.vy = ct.koDismountVy;
            // Buffer directional input for dismount
            let dismountDir = 0;
            if (isDown('A')) dismountDir -= 1;
            if (isDown('D')) dismountDir += 1;
            p.vx = dismountDir * ct.dismountLateralSpeed;
            if (dismountDir !== 0) p.facing = dismountDir;
            p.chainCombo++;
            p.chainTimer = ct.chainWindowSeconds;
            if (p.chainCombo > bestChainCombo) { bestChainCombo = p.chainCombo; saveProgress(); }
            const koDef = CHAR_BY_NAME[npc.npcType];
            const isBigKO = koDef.isSpecial;
            spawnStars(npc.x, npc.y - npc.h, isBigKO ? 12 : 8);
            addShake(isBigKO ? ct.koBigShakeAmount : ct.koNormalShakeAmount, isBigKO ? ct.koBigShakeDuration : ct.koNormalShakeDuration);
            const chainMult = p.chainCombo > 1 ? p.chainCombo : 1;
            const baseScore = koDef.koScore ? koDef.koScore + p.combo * 100 : 100 + p.combo * 50;
            score += baseScore * chainMult;
            // Center screen big KO announcement for special types
            if (koDef.koText) centerKO = { text: koDef.koText, color: koDef.koColor, timer: ct.centerKoDuration };
            // Teabag icon spawned as special particle
            popups.push({ x: npc.x, y: npc.y - npc.h - 25, text: null, teabag: true, life: ct.teabagPopupLife, maxLife: ct.teabagPopupLife });
            if (p.chainCombo > 1) {
              spawnPopup(npc.x, npc.y - npc.h - 60, `CHAIN x${p.chainCombo}!`, '#00FFAA');
            }
            totalKOs++;
            allTimeKOs++;
            koTracker[npc.npcType] = (koTracker[npc.npcType] || 0) + 1;
            saveProgress();
          }
        }
      }
    }
  } else {
    // Check landing on NPC heads
    if (p.vy > 0) {
      for (const npc of npcs) {
        if (npc.state !== 'walking' && npc.state !== 'panicking') continue;
        const headY = npc.y - npc.h;
        if (p.x > npc.x - npc.w / 2 - 6 && p.x < npc.x + npc.w / 2 + 6 &&
            p.prevY <= headY + 4 && p.y >= headY - 4 && p.vy > 0) {
          const wasAerial = !p.onRealGround;
          p.mountedNPC = npc; npc.state = 'panicking';
          p.vy = 0; p.onGround = true; p.onPlatform = null;
          // Don't reset combo on mount — air combos can continue!
          p.crouchCycleActive = false; p.jumpCount = 0;
          p.onRealGround = false;
          if (p.chainTimer > 0) p.chainTimer = ct.chainWindowSeconds; // refresh timer on mount
          playSFX('mount');
          spawnDust(npc.x, headY, 3, '#fff'); addShake(ct.mountShakeAmount, ct.mountShakeDuration);
          // Aerial bonus (mounted while chain active)
          if (wasAerial && p.chainCombo > 0) {
            const bonus = ct.aerialBonusBase * (p.chainCombo + 1);
            score += bonus;
            spawnPopup(npc.x, headY - 40, `AERIAL +${bonus}`, '#00DDFF');
          }
          spawnPopup(npc.x, headY - 20, 'MOUNTED!', '#3B82F6');
          break;
        }
      }
    }
  }
}

function updatePlayerTimersAndFX(dt, p, onNPC) {
  const mt = TUNING.movement;
  // Combo timer — pauses while airborne (platform/NPC counts as air)
  if (p.comboTimer > 0 && p.onRealGround) { p.comboTimer -= dt; if (p.comboTimer <= 0) p.combo = 0; }
  // Chain combo timer — must mount another NPC before chain window expires
  if (p.chainTimer > 0 && !p.mountedNPC) { p.chainTimer -= dt; if (p.chainTimer <= 0) { p.chainCombo = 0; } }
  // Center KO announcement timer
  if (centerKO) { centerKO.timer -= dt; if (centerKO.timer <= 0) centerKO = null; }

  // Squash recovery
  p.squashX = lerp(p.squashX, 1, dt * mt.squashRecoveryRate);

  // Walk animation
  if (p.onGround && Math.abs(p.vx) > mt.walkAnimMinSpeed && !onNPC) p.walkPhase += Math.abs(p.vx) * dt * mt.walkAnimSpeed;
  else if (!onNPC) p.walkPhase = lerp(p.walkPhase, 0, dt * mt.walkAnimLerp);

  // Breathing & blinking
  p.breathPhase += dt * mt.breathingRate;
  p.blinkTimer -= dt;
  if (p.blinkTimer <= 0) p.blinkTimer = rand(mt.blinkMin, mt.blinkMax);

  // Sprint lines
  if (p.isSprinting && Math.abs(p.vx) > PLAYER_SPEED && Math.random() > mt.sprintTrailChanceThreshold) {
    particles.push({ x: p.x - p.facing * mt.sprintTrailOffset + rand(-5, 5), y: p.y - p.h / 2 + rand(-10, 10),
      vx: -p.facing * rand(40, 100), vy: rand(-10, 10), life: mt.sprintTrailLife, maxLife: mt.sprintTrailLife, size: rand(1, 2), color: '#fff' });
  }
  if (p.onRealGround && !onNPC && Math.abs(p.vx) > mt.walkAnimMinSpeed * 1.5 && Math.random() < dt * 10) {
    spawnMatterDebris(p.x - p.facing * 6, p.y, 1, '#D8D8D8', {
      spread: 2,
      speedMin: 20,
      speedMax: 60,
      sizeMin: 1.2,
      sizeMax: 2.6,
      spawnChance: TUNING.vfx.matterWalkStepChance,
    });
  }
}

function updatePlayerState(dt) {
  const p = player;
  const onNPC = p.mountedNPC !== null;

  // Store previous Y for platform one-way check
  p.prevY = p.y;

  updatePlayerMovementAndJump(dt, p, onNPC);
  updateMountedCombatState(p);
  updatePlayerTimersAndFX(dt, p, onNPC);

  return p;
}

function updateNPCFSM(dt, p) {
  const st = TUNING.spawn;
  // ── NPC Update ──
  for (let i = npcs.length - 1; i >= 0; i--) {
    const npc = npcs[i];
    npc.breathPhase += dt * st.npcBreathingRate;
    npc.blinkTimer -= dt;
    if (npc.blinkTimer <= 0) npc.blinkTimer = rand(st.npcBlinkMin, st.npcBlinkMax);

    switch (npc.state) {
      case 'walking':
        npc.x += npc.vx * dt;
        npc.walkPhase += Math.abs(npc.vx) * dt * st.walkAnimSpeed;
        if (Math.random() < dt * st.wanderRetargetChancePerSec) npc.vx = (Math.random() > 0.5 ? 1 : -1) * rand(st.wanderSpeedMin, st.wanderSpeedMax);
        npc.facing = npc.vx > 0 ? 1 : -1;
        break;
      case 'panicking':
        npc.panicTimer -= dt;
        if (npc.panicTimer <= 0) { npc.panicDir *= -1; npc.panicTimer = rand(st.panicTimerMin, st.panicTimerMax); }
        npc.vx = npc.panicDir * npc.panicSpeed;
        npc.x += npc.vx * dt;
        npc.facing = npc.vx > 0 ? 1 : -1;
        npc.walkPhase += Math.abs(npc.vx) * dt * st.panicAnimSpeed;
        // Calm down if not currently mounted (so player can re-mount)
        if (p.mountedNPC !== npc) {
          npc.calmTimer += dt;
          if (npc.calmTimer > st.calmDownSeconds) {
            npc.state = 'walking';
            npc.vx = npc.facing * rand(st.calmWalkSpeedMin, st.calmWalkSpeedMax);
            npc.calmTimer = 0;
          }
        } else {
          npc.calmTimer = 0;
        }
        break;
      case 'ko':
        npc.koTimer -= dt;
        if (npc.koTimer <= 0) {
          npc.state = 'fleeing';
          npc.vx = (npc.x < p.x ? -1 : 1) * rand(st.fleeSpeedMin, st.fleeSpeedMax);
          npc.facing = npc.vx > 0 ? 1 : -1;
        }
        break;
      case 'fleeing':
        npc.x += npc.vx * dt;
        npc.walkPhase += Math.abs(npc.vx) * dt * st.fleeAnimSpeed;
        npc.fleeOpacity = Math.max(0, npc.fleeOpacity - dt * st.fleeFadePerSec);
        if (npc.fleeOpacity <= 0) npc.state = 'gone';
        break;
      case 'gone':
        npcs.splice(i, 1); continue;
    }

    // Despawn NPCs far from player (except mounted or actively interacting)
    if ((npc.state === 'walking') && npc !== p.mountedNPC) {
      const dist = Math.abs(npc.x - p.x);
      if (dist > NPC_DESPAWN_DIST) { npcs.splice(i, 1); continue; }
    }
  }
}

function updateNPCSpawning(p) {
  const st = TUNING.spawn;
  // ── NPC Spawning — always keep NPCs nearby ──
  const activeNPCs = npcs.filter(n => n.state === 'walking' || n.state === 'panicking');
  const activeNPCCount = activeNPCs.length;
  const screenLeft = cam.x;
  const screenRight = cam.x + W;
  const visibleNPCs = activeNPCs.filter(n => n.x > screenLeft - st.visibleSpawnMargin && n.x < screenRight + st.visibleSpawnMargin);

  if (visibleNPCs.length < MIN_NPCS_ON_SCREEN && activeNPCCount < MAX_NPCS) {
    // Spawn well off screen so they walk in naturally
    const side = Math.random() > 0.5 ? 1 : -1;
    const spawnX = side > 0 ? screenRight + rand(st.offscreenSpawnMin, st.offscreenSpawnMax) : screenLeft - rand(st.offscreenSpawnMin, st.offscreenSpawnMax);
    spawnNPC(spawnX);
  }
  // Also spawn ahead of a sprinting player (in their facing direction)
  if (p.isSprinting && activeNPCCount < MAX_NPCS) {
    const dir = p.facing;
    const ahead = activeNPCs.filter(n => dir > 0 ? (n.x > p.x && n.x < p.x + st.sprintAheadDistance) : (n.x < p.x && n.x > p.x - st.sprintAheadDistance));
    if (ahead.length < st.sprintAheadMinCount) spawnNPC(p.x + dir * rand(st.sprintSpawnMin, st.sprintSpawnMax));
  }
}

function updateBusStopAmbient(dt, p) {
  const st = TUNING.spawn;
  // ── Bus Stop NPC Update ──
  for (const plat of platforms) {
    if (!plat.busStop) continue;
    const nearMounting = p.mountedNPC && Math.abs(p.x - (plat.x + plat.w / 2)) < plat.w + st.busStopPanicRangePad;
    for (const bNpc of plat.busStop.npcs) {
      bNpc.breathPhase += dt * st.npcBreathingRate;
      bNpc.blinkTimer -= dt;
      if (bNpc.blinkTimer <= 0) bNpc.blinkTimer = rand(st.npcBlinkMin, st.npcBlinkMax);
      bNpc.panicState = nearMounting;
      if (bNpc.panicState && bNpc.armsWave) bNpc.panicPhase += dt * st.busStopPanicWaveSpeed;
    }
  }
}

function updateNPCState(dt, p) {
  updateNPCFSM(dt, p);
  updateNPCSpawning(p);
  updateBusStopAmbient(dt, p);
}

function updateWorldState(gameCtx, dt, p) {
  const ut = TUNING.uiTiming;
  const wt = TUNING.world;
  // ── Camera ──
  const wantsSprintLens = sprintDown() && !p.mountedNPC && !p.isCrouching;
  const airSprintLens = !p.onGround && p.wasSprinting && wantsSprintLens;
  const sprintLensActive = (p.isSprinting || airSprintLens) && !p.mountedNPC;
  setSprintCameraTightening(sprintLensActive, airSprintLens);
  cam.targetX = p.x - W * cam.leadFactor + cam.forwardLookAhead;
  cam.x = lerp(cam.x, cam.targetX, dt * cam.followLerp);
  if (wt.cameraHandheldEnabled) {
    cam.handheldPhase += dt;
    const speedNorm = clamp(Math.abs(p.vx) / (PLAYER_SPEED * SPRINT_MULT), 0, 1);
    const motionIntensity = clamp(
      speedNorm * wt.cameraHandheldSpeedInfluence + (sprintLensActive ? wt.cameraHandheldSprintBoost : 0),
      0,
      1
    );
    const ampX = wt.cameraHandheldBaseAmpX + wt.cameraHandheldMoveAmpX * motionIntensity;
    const ampY = wt.cameraHandheldBaseAmpY + wt.cameraHandheldMoveAmpY * motionIntensity;
    const xWave =
      Math.sin(cam.handheldPhase * Math.PI * 2 * wt.cameraHandheldFreqX) +
      Math.sin(cam.handheldPhase * Math.PI * 2 * wt.cameraHandheldFreqX * 0.47 + 1.3) * 0.38;
    const yWave =
      Math.sin(cam.handheldPhase * Math.PI * 2 * wt.cameraHandheldFreqY + 0.6) +
      Math.sin(cam.handheldPhase * Math.PI * 2 * wt.cameraHandheldFreqY * 0.53 + 2.1) * 0.34;
    let targetHandheldX = xWave * ampX;
    let targetHandheldY = yWave * ampY;
    const snap = wt.cameraHandheldPixelSnap || 0;
    if (snap > 0) {
      targetHandheldX = Math.round(targetHandheldX / snap) * snap;
      targetHandheldY = Math.round(targetHandheldY / snap) * snap;
    }
    cam.handheldX = lerp(cam.handheldX, targetHandheldX, dt * wt.cameraHandheldLerp);
    cam.handheldY = lerp(cam.handheldY, targetHandheldY, dt * wt.cameraHandheldLerp);
  } else {
    cam.handheldX = lerp(cam.handheldX, 0, dt * 6);
    cam.handheldY = lerp(cam.handheldY, 0, dt * 6);
  }

  // Campaign left-boundary soft wall
  if (gameCtx.state.gameMode === 'campaign' && zoneLayout.length > 0) {
    const leftLimit = zoneLayout[0].startX - wt.campaignLeftSoftWallPad;
    if (p.x < leftLimit) { p.x = leftLimit; if (p.vx < 0) p.vx = 0; }
  }

  // ── Zone Tracking ──
  const zoneResult = getZoneAtX(p.x);
  if (gameCtx.state.gameMode === 'campaign' && zoneLayout.length > 0 && p.x >= zoneLayout[zoneLayout.length - 1].endX) {
    triggerPrestige(gameCtx);
  } else if (zoneResult.zone !== gameCtx.state.currentZone) {
    gameCtx.state.currentZone = zoneResult.zone;
    gameCtx.state.currentZoneIndex = zoneResult.index;
    gameCtx.services.playSFX('zoneTransition');
    gameCtx.state.zoneTransitionAnim = { timer: ut.zoneTransitionDuration, maxTimer: ut.zoneTransitionDuration, zoneName: gameCtx.state.currentZone.name, color: gameCtx.state.currentZone.displayColor };
    // Unlock zone for endless mode
    if (gameCtx.state.gameMode === 'campaign' && !gameCtx.state.unlockedZones.includes(gameCtx.state.currentZone.id)) {
      gameCtx.state.unlockedZones.push(gameCtx.state.currentZone.id);
      gameCtx.services.saveProgress();
    }
  }
  // Zone transition animation timer
  if (gameCtx.state.zoneTransitionAnim) {
    gameCtx.state.zoneTransitionAnim.timer -= dt;
    if (gameCtx.state.zoneTransitionAnim.timer <= 0) gameCtx.state.zoneTransitionAnim = null;
  }

  // ── Generation ──
  generateCity(cam.x - wt.generationMargin, cam.x + W + wt.generationMargin);
  generatePlatforms(cam.x - wt.generationMargin, cam.x + W + wt.generationMargin);

  gameCtx.state.dayTime = (gameCtx.state.dayTime + dt) % DAY_CYCLE;
  updateBirds(dt);
  updateCars(dt);
  updateParticles(dt);
  updateMatterFX(dt);
  updatePopups(dt);
}

function updatePlayingState(gameCtx, dt) {
  // Playing - check for pause
  if (gameCtx.input.justPressed['Escape'] || gameCtx.input.justPressed['KeyP'] || gameCtx.input.touch.pauseJust) {
    gameCtx.state.gameState = 'paused'; gameCtx.state.pauseSelection = 0;
    return;
  }

  const p = updatePlayerState(dt);
  updateNPCState(dt, p);
  updateWorldState(gameCtx, dt, p);
}

function update(gameCtx, dt) {
  if (gameCtx.state.galleryMode) return;
  if (updateMenuState(gameCtx, dt)) return;
  if (updatePauseState(gameCtx)) return;
  updatePlayingState(gameCtx, dt);
}

// ── Render ──
function renderFrontScreen(gameCtx) {
  if (gameCtx.state.galleryMode) {
    ctx.save(); ctx.translate(GAME_OX, 0);
    drawGallery();
    ctx.restore();
    drawSideBars();
    return true;
  }
  if (gameCtx.state.gameState === 'title') {
    ctx.save(); ctx.translate(GAME_OX, 0);
    drawTitleScreen();
    ctx.restore();
    drawSideBars();
    return true;
  }
  if (gameCtx.state.gameState === 'modeselect') {
    ctx.save(); ctx.translate(GAME_OX, 0);
    drawModeSelect();
    ctx.restore();
    drawSideBars();
    return true;
  }
  if (gameCtx.state.gameState === 'zonepicker') {
    ctx.save(); ctx.translate(GAME_OX, 0);
    drawZonePicker();
    ctx.restore();
    drawSideBars();
    return true;
  }
  return false;
}

function renderWorldLayer(sky) {
  // Stars
  if (sky.stars > 0) {
    const t = performance.now() / 1000;
    for (const s of stars) {
      const twinkle = 0.5 + 0.5 * Math.sin(t * 1.5 + s.twinkle);
      ctx.globalAlpha = sky.stars * twinkle * 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  drawZoneSilhouettes();
  drawClouds();
  drawBirds();

  // BG buildings
  for (const b of bgBuildings) { const sx = b.x * 0.3 - cam.x * 0.3; if (sx + b.w > -50 && sx < W + 50) drawBuilding(b, 0.3); }
  // FG buildings
  for (const b of buildings) { const sx = b.x * 0.7 - cam.x * 0.7; if (sx + b.w > -50 && sx < W + 50) drawBuilding(b, 0.7); }

  // Cars (no road — they drive behind the sidewalk layer)
  for (const car of cars) drawCar(car);

  // Platforms & bus stop structures (NPCs drawn after sidewalk)
  for (const plat of platforms) {
    const sx = plat.x - cam.x;
    if (sx + plat.w > -50 && sx < W + 50) {
      if (plat.isBusStop) drawBusStopStructure(plat);
      else drawPlatform(plat);
    }
  }

  // Sidewalk (zone-specific with crossfade)
  { const { a: gzA, b: gzB, t: gzT } = getZoneBlend();
    const swColor = gzT === 0 ? gzA.sidewalkColor : lerpColor(gzA.sidewalkColor, gzB.sidewalkColor, gzT);
    const grColor = gzT === 0 ? gzA.groundColor : lerpColor(gzA.groundColor, gzB.groundColor, gzT);
    ctx.fillStyle = swColor; ctx.fillRect(0, GROUND_Y, W, 4);
    ctx.fillStyle = grColor; ctx.fillRect(0, GROUND_Y + 4, W, H - GROUND_Y - 4);
    function drawGroundPattern(zid, zone, alpha) {
      if (alpha <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha;
      if (zid === 'park') {
        ctx.fillStyle = '#6B9A5B';
        for (let gx = (-cam.x % 12) - 12; gx < W + 12; gx += 12)
          for (let gy = GROUND_Y + 2; gy < H; gy += 8)
            ctx.fillRect(gx + ((gy * 7) % 9), gy, 2, 4);
        ctx.fillStyle = '#5A8A4B';
        for (let gx = (-cam.x % 18) - 18; gx < W + 18; gx += 18)
          for (let gy = GROUND_Y + 5; gy < H; gy += 11)
            ctx.fillRect(gx + ((gy * 3) % 13), gy, 1, 3);
      } else if (zid === 'shopping') {
        ctx.fillStyle = zone.sidewalkLineColor;
        const brickW = 16, brickH = 8;
        for (let row = 0; row * brickH + GROUND_Y + 4 < H; row++) {
          const offset = (row % 2) * (brickW / 2);
          const by = GROUND_Y + 4 + row * brickH;
          for (let bx = (-cam.x % brickW) - brickW + offset; bx < W + brickW; bx += brickW)
            ctx.fillRect(bx, by, brickW - 1, brickH - 1);
        }
      } else if (zid === 'industrial') {
        ctx.fillStyle = zone.sidewalkLineColor;
        for (let lx = (-cam.x % 80) - 80; lx < W + 80; lx += 80) ctx.fillRect(lx, GROUND_Y + 4, 2, H - GROUND_Y - 4);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
        for (let cx = (-cam.x % 120) - 120; cx < W + 120; cx += 120) {
          ctx.beginPath(); ctx.moveTo(cx, GROUND_Y + 6); ctx.lineTo(cx + 8, GROUND_Y + 18); ctx.lineTo(cx + 3, GROUND_Y + 28); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx + 8, GROUND_Y + 18); ctx.lineTo(cx + 16, GROUND_Y + 14); ctx.stroke();
        }
        ctx.fillStyle = 'rgba(40,30,50,0.18)';
        for (let ox = (-cam.x % 200) - 200; ox < W + 200; ox += 200) { ctx.beginPath(); ctx.ellipse(ox + 30, GROUND_Y + 10, 18, 6, 0.2, 0, Math.PI * 2); ctx.fill(); }
        ctx.fillStyle = 'rgba(60,40,80,0.1)';
        for (let ox = (-cam.x % 280) - 140; ox < W + 280; ox += 280) { ctx.beginPath(); ctx.ellipse(ox + 10, GROUND_Y + 16, 12, 4, -0.3, 0, Math.PI * 2); ctx.fill(); }
      } else {
        ctx.fillStyle = zone.sidewalkLineColor;
        for (let lx = (-cam.x % 80) - 80; lx < W + 80; lx += 80) ctx.fillRect(lx, GROUND_Y + 4, 2, H - GROUND_Y - 4);
      }
      ctx.restore();
    }
    if (gzT === 0 || gzA.id === gzB.id) {
      drawGroundPattern(gzA.id, gzA, 1);
    } else {
      drawGroundPattern(gzA.id, gzA, 1 - gzT);
      drawGroundPattern(gzB.id, gzB, gzT);
    }
  }
}

function renderEntityLayer() {
  const playerSX = player.x - cam.x;
  const playerSY = player.y;

  // Bus stop NPCs between shelter base and front glass.
  for (const plat of platforms) {
    if (!plat.isBusStop) continue;
    const sx = plat.x - cam.x;
    if (sx + plat.w > -50 && sx < W + 50) drawBusStopNPCs(plat, playerSX, playerSY);
  }
  for (const plat of platforms) {
    if (!plat.isBusStop) continue;
    const sx = plat.x - cam.x;
    if (sx + plat.w > -50 && sx < W + 50) drawBusStopFrontGlass(plat);
  }

  // Props
  for (const pr of props) { const sx = pr.x - cam.x; if (sx > -50 && sx < W + 50) drawProp(pr); }

  // NPCs
  for (const npc of npcs) {
    if (npc.state === 'gone') continue;
    const sx = npc.x - cam.x;
    if (sx < -100 || sx > W + 100) continue;

    // Prestige 4+: NPC glow aura
    if (prestigeLevel >= 4 && npc.state !== 'ko' && npc.state !== 'fleeing') {
      ctx.save();
      ctx.shadowColor = npc.color || '#FF6B6B';
      ctx.shadowBlur = 8 + prestigeLevel * 2;
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.beginPath(); ctx.arc(sx, GROUND_Y - npc.h / 2, npc.w * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    if (npc.state === 'ko') {
      ctx.save(); ctx.translate(sx, GROUND_Y);
      ctx.rotate(Math.PI / 2 * npc.facing);
      drawCharacter(0, 0, npc.w, npc.h, { ...npcVisualOpts(npc), isKO: true });
      const starCount = 3;
      for (let s = 0; s < starCount; s++) {
        const a = (performance.now() / 300 + s * Math.PI * 2 / starCount);
        ctx.globalAlpha = 0.8; drawStar(Math.cos(a) * 15, -npc.h - 10 + Math.sin(a) * 5, 3, '#FFD700'); ctx.globalAlpha = 1;
      }
      ctx.restore();
    } else {
      drawCharacter(sx, GROUND_Y, npc.w, npc.h, {
        ...npcVisualOpts(npc),
        walkPhase: npc.walkPhase, breathing: Math.sin(npc.breathPhase) * 1,
        blinkTimer: npc.blinkTimer,
        isFleeing: npc.state === 'fleeing' || npc.state === 'panicking',
      });

      // Health bar (show on any damaged NPC)
      if ((npc.state === 'panicking' || npc.state === 'walking') && npc.health < npc.maxHealth) {
        const lblDef = CHAR_BY_NAME[npc.npcType];
        const isBigNPC = lblDef.isSpecial;
        const barW = (isBigNPC ? 44 : 30) * UI_S, barH = 4 * UI_S;
        const barX = sx - barW / 2, barY = GROUND_Y - npc.h - 18;
        ctx.fillStyle = '#333'; ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
        const hpPct = npc.health / npc.maxHealth;
        ctx.fillStyle = hpPct > 0.5 ? '#48BB78' : hpPct > 0.25 ? '#ECC94B' : '#F56565';
        ctx.fillRect(barX, barY, barW * hpPct, barH);
        if (lblDef.labelText) {
          ctx.fillStyle = lblDef.labelColor; ctx.font = `bold ${Math.round(9 * UI_S)}px monospace`; ctx.textAlign = 'center';
          ctx.fillText(lblDef.labelText, sx, barY - 3);
        }
      }
    }
  }

  // Player
  const px = player.x - cam.x;
  drawCharacter(px, player.y, player.w, player.h, {
    facing: player.facing, color: '#3B82F6', skinColor: '#FBBF6B', hairColor: '#3D2B1F',
    walkPhase: player.walkPhase, breathing: Math.sin(player.breathPhase) * 1.5,
    blinkTimer: player.blinkTimer, isCrouching: player.isCrouching, squash: player.squashX,
    airState: (!player.onGround && !player.mountedNPC) ? (player.vy < 0 ? 'rising' : 'falling') : null,
    isMovingJump: (!player.onGround && !player.mountedNPC) && Math.abs(player.vx) > 30,
    isPlayer: true,
  });

  drawParticles();
  drawMatterFX();
  drawPopups();
}

function renderPostFX(sky) {
  const ut = TUNING.uiTiming;
  // Night ambient overlay (darkens everything below HUD)
  if (sky.amb > 0) {
    ctx.globalAlpha = sky.amb * ut.postFXNightAlphaScale;
    ctx.fillStyle = '#05051A';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Zone color grading (crossfade)
  { const { a: szA, b: szB, t: szT } = getZoneBlend();
    if (szT === 0 || szA.skyTint === szB.skyTint) {
      if (szA.skyTint) { ctx.fillStyle = szA.skyTint; ctx.fillRect(0, 0, W, H); }
    } else {
      if (szA.skyTint) { ctx.save(); ctx.globalAlpha = 1 - szT; ctx.fillStyle = szA.skyTint; ctx.fillRect(0, 0, W, H); ctx.restore(); }
      if (szB.skyTint) { ctx.save(); ctx.globalAlpha = szT; ctx.fillStyle = szB.skyTint; ctx.fillRect(0, 0, W, H); ctx.restore(); }
    }
  }

  // Prestige visual effects
  if (prestigeLevel >= 1) {
    // Radial vignette
    const vigIntensity = Math.min(ut.vignetteMax, ut.vignettePerPrestige * prestigeLevel);
    const vigGrad = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, `rgba(0,0,0,${vigIntensity})`);
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);
  }
  if (prestigeLevel >= 2) {
    // Scanline overlay
    ctx.fillStyle = `rgba(0,0,0,${ut.scanlineAlpha})`;
    for (let sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);
  }
  if (prestigeLevel >= 3) {
    // Chromatic aberration (red/blue offset strips)
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = ut.chromaStrengthPerLevel * Math.min(prestigeLevel - 2, 3);
    ctx.fillStyle = '#FF0000'; ctx.fillRect(-2, 0, W, H);
    ctx.fillStyle = '#0000FF'; ctx.fillRect(2, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }
}

function renderHUDLayer(gameCtx) {
  const ut = TUNING.uiTiming;
  const ct = TUNING.combat;
  // ── HUD ──
  const hudL = 10 + HUD_INSET; // left edge, shifted inward past sidebar overlap
  const hudY = 10, hudH = Math.round(36 * UI_S), hudR = 6;
  const hudFont = Math.round(14 * UI_S);
  const hudMidY = hudY + hudH / 2;
  const hudTextY = hudMidY + 1; // nudge text down 1px for visual centering with monospace

  const scoreW = Math.round(160 * UI_S);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(ctx, hudL, hudY, scoreW, hudH, hudR);
  ctx.fillStyle = '#fff'; ctx.font = `bold ${hudFont}px monospace`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`SCORE: ${score}`, hudL + 10, hudTextY);

  // Teabag KO counter
  const koX = hudL + scoreW + 10;
  const koW = Math.round(100 * UI_S);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(ctx, koX, hudY, koW, hudH, hudR);
  drawTeabag(koX + Math.round(20 * UI_S), hudMidY + 2, 0.8 * UI_S, 1);
  ctx.fillStyle = '#FF6B6B'; ctx.font = `bold ${hudFont}px monospace`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`x ${totalKOs}`, koX + Math.round(35 * UI_S), hudTextY);

  // Chain combo
  { const chainX = koX + koW + 10;
    const chainW = Math.round(160 * UI_S);
    ctx.fillStyle = player.chainCombo > 0 ? 'rgba(0,200,150,0.5)' : 'rgba(0,0,0,0.4)';
    roundRect(ctx, chainX, hudY, chainW, hudH, hudR);
    ctx.textBaseline = 'middle';
    if (player.chainCombo > 0) {
      const pulse = 1 + Math.sin(performance.now() / ut.chainPulseMs) * 0.08;
      ctx.fillStyle = '#00FFAA'; ctx.font = `bold ${Math.round(hudFont * pulse)}px monospace`; ctx.textAlign = 'left';
      ctx.fillText(`CHAIN x${player.chainCombo}`, chainX + 10, hudTextY);
      // Timer bar
      const barW = chainW - 20, barH = 3;
      const barY = hudY + hudH - 6;
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(chainX + 10, barY, barW, barH);
      ctx.fillStyle = player.chainTimer > ut.chainDangerSeconds ? '#00FFAA' : '#FF6B6B';
      ctx.fillRect(chainX + 10, barY, barW * (player.chainTimer / ct.chainWindowSeconds), barH);
    } else {
      ctx.fillStyle = '#fff'; ctx.font = `bold ${hudFont}px monospace`; ctx.textAlign = 'left';
      ctx.fillText(`BEST CHAIN: ${bestChainCombo}`, chainX + 10, hudTextY);
    }
  }
  ctx.textBaseline = 'alphabetic';

  if (player.combo > 0 && player.comboTimer > 0) {
    ctx.globalAlpha = Math.min(1, player.comboTimer);
    ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round((ut.comboLabelBase + player.combo * ut.comboLabelPerStack) * UI_S)}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(`${player.combo}x COMBO`, W / 2, Math.round(ut.comboLabelY * UI_S)); ctx.globalAlpha = 1;
  }

  // Center screen big KO announcement
  if (centerKO) {
    const progress = 1 - centerKO.timer / ct.centerKoDuration;
    const scale = progress < ut.centerKoPopInFraction ? progress / ut.centerKoPopInFraction : 1; // quick pop in
    const alpha = centerKO.timer < ut.centerKoFadeOutSeconds ? centerKO.timer / ut.centerKoFadeOutSeconds : 1; // fade out
    ctx.globalAlpha = alpha;
    ctx.fillStyle = centerKO.color;
    ctx.font = `bold ${Math.round(42 * UI_S * scale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(centerKO.text, W / 2, H * ut.centerKoYFactor);
    // Shadow for readability
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(centerKO.text, W / 2 + ut.centerKoShadowOffset, H * ut.centerKoYFactor + ut.centerKoShadowOffset);
    ctx.fillStyle = centerKO.color;
    ctx.fillText(centerKO.text, W / 2, H * ut.centerKoYFactor);
    ctx.globalAlpha = 1;
  }

  // KO tracker (bottom left)
  const activeTrackers = trackerTypes.filter(t => getTrackerCount(t) > 0);
  if (activeTrackers.length > 0) {
    const trkFont = Math.round(9 * UI_S), trkNumFont = Math.round(12 * UI_S);
    const trkH = Math.round(30 * UI_S), trkBotY = H - Math.round(12 * UI_S);
    ctx.font = `bold ${trkFont}px monospace`;
    const padX = Math.round(12 * UI_S), gap = Math.round(10 * UI_S);
    let totalW = padX;
    const positions = activeTrackers.map(t => {
      const lw = ctx.measureText(t.label).width;
      const nw = ctx.measureText(`${getTrackerCount(t)}`).width;
      const colW = Math.max(lw, nw, Math.round(20 * UI_S));
      const pos = { t, cx: totalW + colW / 2, colW };
      totalW += colW + gap;
      return pos;
    });
    totalW += padX - gap;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(ctx, hudL, trkBotY - trkH, totalW, trkH, 6);
    ctx.textAlign = 'center';
    for (const { t, cx } of positions) {
      const tx = hudL + cx;
      ctx.font = `bold ${trkFont}px monospace`;
      ctx.fillStyle = t.color; ctx.fillText(t.label, tx, trkBotY - Math.round(16 * UI_S));
      ctx.fillStyle = '#fff'; ctx.font = `bold ${trkNumFont}px monospace`;
      ctx.fillText(`${getTrackerCount(t)}`, tx, trkBotY - Math.round(4 * UI_S));
    }
  }

  if (!isMobile) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText('WASD/Arrows: Move+Jump (2x!) | Double-tap dir: Sprint | \u2193/Space: Crouch | ESC: Pause', W - 10, H - 10);
  }

  // Zone indicator pill (bottom-left, above KO tracker)
  {
    const zFont = Math.round(10 * UI_S);
    const zY = H - Math.round(50 * UI_S);
    const zText = currentZone.name;
    ctx.font = `bold ${zFont}px monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tw = ctx.measureText(zText).width;
    const zPad = Math.round(8 * UI_S);
    const zW = tw + zPad * 2;
    const zH = zFont + zPad;
    const zTop = zY - zFont;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, hudL, zTop, zW, zH, 4);
    ctx.fillStyle = currentZone.displayColor;
    ctx.fillText(zText, hudL + zW / 2, zTop + zH / 2);
    // Prestige indicator
    if (gameMode === 'campaign' && prestigeLevel > 0) {
      ctx.fillStyle = '#FFD700'; ctx.textAlign = 'left';
      ctx.fillText(`P${prestigeLevel}`, hudL + zW + 6, zTop + zH / 2);
    }
    ctx.textBaseline = 'alphabetic';
  }

  // Zone transition animation (big centered zone name)
  if (zoneTransitionAnim) {
    const zt = zoneTransitionAnim;
    const progress = 1 - zt.timer / zt.maxTimer;
    let alpha;
    if (progress < ut.zoneTransitionFadeInFraction) alpha = progress / ut.zoneTransitionFadeInFraction;
    else if (progress > ut.zoneTransitionFadeOutStart) alpha = (1 - progress) / ut.zoneTransitionFadeOutSpan;
    else alpha = 1;
    ctx.globalAlpha = alpha * ut.zoneTransitionAlpha;
    ctx.fillStyle = zt.color;
    ctx.font = `bold ${Math.round(36 * UI_S)}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(zt.zoneName.toUpperCase(), W / 2, H * ut.zoneTransitionYFactor);
    ctx.globalAlpha = 1;
  }
}

function renderOverlayLayer(gameCtx, sky) {
  renderPostFX(sky);
  renderHUDLayer(gameCtx);
}

function render(gameCtx, dt) {
  const shake = getShakeOffset(dt);
  ctx.save(); ctx.scale(PX_SCALE, PX_SCALE);

  if (renderFrontScreen(gameCtx)) { ctx.restore(); return; }

  // Game area with screen shake + sidebar offset
  ctx.save(); ctx.translate(shake.x, shake.y);
  ctx.save(); ctx.translate(GAME_OX, 0);

  // Sky (day/night cycle)
  const dayPhase = gameCtx.state.dayTime / DAY_CYCLE;
  const sky = getDayValues(dayPhase);
  ctx.save();
  ctx.translate(cam.handheldX, cam.handheldY);
  if (cam.zoom !== 1) {
    const cx = W * 0.5;
    const cy = H * 0.5;
    ctx.translate(cx, cy);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cx, -cy);
  }
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, sky.top); grad.addColorStop(0.5, sky.mid); grad.addColorStop(1, sky.bot);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  renderWorldLayer(sky);
  renderEntityLayer();
  ctx.restore();
  renderOverlayLayer(gameCtx, sky);

  ctx.restore(); // undo SIDE_W translate
  ctx.restore(); // undo shake translate

  // Pause overlay (drawn over everything including sidebars)
  if (gameCtx.state.gameState === 'paused') {
    ctx.save(); ctx.translate(GAME_OX, 0);
    drawPauseMenu();
    ctx.restore();
  }

  drawSideBars();
  ctx.restore(); // undo scale
}

// ── Zone Parallax Silhouettes ──
const bgSilhouettes = {};

function generateSilhouettes() {
  // Silhouette heights must exceed bgBuildingHeightRange to peek above BG layer
  bgSilhouettes.skyscrapers = []; // BG max 380 → silhouettes 300-420
  for (let i = 0; i < 40; i++) bgSilhouettes.skyscrapers.push({ x: i * 160 - 500 + rand(-30, 30), w: rand(30, 60), h: rand(300, 420), color: `rgba(60,70,90,${rand(0.3, 0.5)})` });
  bgSilhouettes.storefronts = []; // BG max 200 → silhouettes 160-260
  for (let i = 0; i < 40; i++) bgSilhouettes.storefronts.push({ x: i * 150 - 500 + rand(-20, 20), w: rand(60, 120), h: rand(160, 260), color: `rgba(140,120,80,${rand(0.25, 0.4)})` });
  bgSilhouettes.treeline = []; // BG max 250 → tree r 140-200 (top at baseY - r*1.5 = up to 330)
  for (let i = 0; i < 50; i++) bgSilhouettes.treeline.push({ x: i * 120 - 500 + rand(-30, 30), r: rand(140, 200), type: Math.random() > 0.4 ? 'round' : 'triangle', color: `rgba(40,100,50,${rand(0.3, 0.5)})` });
  const neonColors = ['#FF1493','#00FFFF','#FF4500','#FFD700','#FF00FF'];
  bgSilhouettes.neon_buildings = []; // BG max 300 → silhouettes 240-360
  for (let i = 0; i < 40; i++) bgSilhouettes.neon_buildings.push({ x: i * 155 - 500 + rand(-25, 25), w: rand(40, 80), h: rand(240, 360), color: `rgba(30,15,40,${rand(0.35, 0.5)})`, dots: Array.from({length: randInt(2, 6)}, () => ({ dx: rand(0.1, 0.9), dy: rand(0.1, 0.9), color: neonColors[randInt(0, neonColors.length - 1)] })) });
  bgSilhouettes.factory = []; // BG max 320 → silhouettes 250-380
  for (let i = 0; i < 35; i++) bgSilhouettes.factory.push({ x: i * 180 - 500 + rand(-30, 30), w: rand(50, 100), h: rand(250, 380), hasStack: Math.random() > 0.5, stackH: rand(40, 80), color: `rgba(70,70,70,${rand(0.3, 0.5)})` });
  bgSilhouettes.houses = []; // BG max 160 → silhouettes 120-200
  for (let i = 0; i < 45; i++) bgSilhouettes.houses.push({ x: i * 140 - 500 + rand(-25, 25), w: rand(40, 70), h: rand(120, 200), roofH: rand(15, 30), color: `rgba(120,100,80,${rand(0.25, 0.4)})` });
}
generateSilhouettes();

function drawSilhouetteSet(shapes, style, baseY, wrapW, alpha) {
  if (!shapes || alpha <= 0) return;
  ctx.globalAlpha = alpha;
  for (const s of shapes) {
    const sx = ((s.x - cam.x * 0.05) % wrapW + wrapW) % wrapW - 300;
    if (sx < -300 || sx > W + 300) continue;

    if (style === 'skyscrapers') {
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, baseY - s.h, s.w, s.h + 30);
      ctx.fillStyle = 'rgba(255,228,161,0.15)';
      for (let wy = 0; wy < s.h - 10; wy += 15) {
        for (let wx = 4; wx < s.w - 4; wx += 10) {
          ctx.fillRect(sx + wx, baseY - s.h + 8 + wy, 4, 6);
        }
      }
    } else if (style === 'storefronts') {
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, baseY - s.h, s.w, s.h + 30);
      ctx.fillStyle = 'rgba(180,140,80,0.2)';
      ctx.fillRect(sx, baseY - s.h, s.w, 6);
    } else if (style === 'treeline') {
      ctx.fillStyle = s.color;
      if (s.type === 'round') {
        ctx.beginPath(); ctx.arc(sx, baseY - s.r * 0.5, s.r, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(sx - s.r * 0.7, baseY);
        ctx.lineTo(sx, baseY - s.r * 1.5);
        ctx.lineTo(sx + s.r * 0.7, baseY);
        ctx.closePath(); ctx.fill();
      }
    } else if (style === 'neon_buildings') {
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, baseY - s.h, s.w, s.h + 30);
      for (const dot of s.dots) {
        ctx.fillStyle = dot.color; ctx.globalAlpha = alpha * 0.4;
        ctx.beginPath(); ctx.arc(sx + s.w * dot.dx, baseY - s.h + s.h * dot.dy, 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = alpha;
    } else if (style === 'factory') {
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, baseY - s.h, s.w, s.h + 30);
      if (s.hasStack) {
        ctx.fillRect(sx + s.w * 0.3, baseY - s.h - s.stackH, 8, s.stackH);
        ctx.beginPath();
        ctx.moveTo(sx + s.w * 0.3 - 3, baseY - s.h - s.stackH);
        ctx.lineTo(sx + s.w * 0.3 + 4, baseY - s.h - s.stackH - 8);
        ctx.lineTo(sx + s.w * 0.3 + 11, baseY - s.h - s.stackH);
        ctx.closePath(); ctx.fill();
      }
    } else if (style === 'houses') {
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, baseY - s.h, s.w, s.h + 30);
      ctx.beginPath();
      ctx.moveTo(sx - 4, baseY - s.h);
      ctx.lineTo(sx + s.w / 2, baseY - s.h - s.roofH);
      ctx.lineTo(sx + s.w + 4, baseY - s.h);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawZoneSilhouettes() {
  const baseY = GROUND_Y - 30;
  const wrapW = W + 1200;
  const { a, b, t } = getZoneBlend();
  if (t === 0 || a.bgStyle === b.bgStyle) {
    drawSilhouetteSet(bgSilhouettes[a.bgStyle], a.bgStyle, baseY, wrapW, 1);
  } else {
    drawSilhouetteSet(bgSilhouettes[a.bgStyle], a.bgStyle, baseY, wrapW, 1 - t);
    drawSilhouetteSet(bgSilhouettes[b.bgStyle], b.bgStyle, baseY, wrapW, t);
  }
}

// ── Clouds ──
const clouds = [];
for (let i = 0; i < 12; i++) clouds.push({ x: rand(-500, 2000), y: rand(20, 120), w: rand(60, 160), h: rand(20, 45) });
function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (const c of clouds) {
    const cx = (c.x - cam.x * 0.1) % (W + 400) - 200;
    ctx.beginPath(); ctx.ellipse(cx, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx - c.w * 0.25, c.y + 5, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + c.w * 0.25, c.y + 3, c.w * 0.35, c.h * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Birds ──
const birds = [];
for (let i = 0; i < 2; i++) {
  const flock = { x: rand(-500, 2000), y: rand(25, 80), speed: rand(20, 40), phase: rand(0, Math.PI * 2), count: randInt(2, 4), members: [] };
  for (let j = 0; j < flock.count; j++) {
    flock.members.push({ ox: rand(-20, 20), oy: rand(-8, 8), phase: rand(0, Math.PI * 2), size: rand(3, 5) });
  }
  birds.push(flock);
}
function updateBirds(dt) {
  for (const flock of birds) {
    flock.x += flock.speed * dt;
    flock.phase += dt * 4;
    // Wrap around
    const sx = (flock.x - cam.x * 0.15) % (W + 600) - 300;
    if (sx > W + 300) flock.x -= W + 600;
  }
}
function drawBirds() {
  const nightAmt = getDayValues(dayTime / DAY_CYCLE).amb;
  ctx.strokeStyle = nightAmt > 0.3 ? '#555' : '#2D3748'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  for (const flock of birds) {
    const fx = (flock.x - cam.x * 0.15) % (W + 600) - 300;
    for (const m of flock.members) {
      const bx = fx + m.ox, by = flock.y + m.oy;
      const wingFlap = Math.sin(flock.phase + m.phase) * 0.4;
      const wingSpan = m.size;
      ctx.beginPath();
      ctx.moveTo(bx - wingSpan, by + wingFlap * wingSpan);
      ctx.lineTo(bx, by);
      ctx.lineTo(bx + wingSpan, by + wingFlap * wingSpan);
      ctx.stroke();
    }
  }
}

// ── Title Screen ──
function drawTitleScreen() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');

  // Title

  ctx.fillText('TEABAG', W / 2, H * 0.15);
  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(36 * UI_S)}px monospace`;

  drawCharacter(W * 0.75, charY, 20, 40, { facing: -1, color: '#38A169', skinColor: '#D4956B', hairColor: '#DAA520', hairStyle: 'long', walkPhase: t * 2.5, breathing: Math.sin(t * 2.3) * 1, blinkTimer: 3 });
  drawCharacter(W * 0.5 + 80, charY, 34, 50, { facing: -1, color: '#8B0000', skinColor: '#D4956B', hairColor: '#2C2C2C', npcType: 'muscle', breathing: Math.sin(t * 1.5) * 1, blinkTimer: 3 });
  drawCharacter(W * 0.5 - 90, charY, 38, 44, { facing: 1, color: '#C8A870', skinColor: '#FBBF6B', hairColor: '#1A1A2E', npcType: 'sumo', breathing: Math.sin(t * 1.3) * 1, blinkTimer: 3 });
  drawCharacter(W * 0.5 + 150, charY, 31, 53, { facing: -1, color: '#CC2222', skinColor: '#FFDBAC', hairColor: '#DAA520', hairStyle: 'pompadour', npcType: 'chad', eyeColor: '#3B82F6', breathing: Math.sin(t * 1.8) * 1, blinkTimer: 3 });
  drawCharacter(W * 0.5, charY, 22, 42, { facing: -1, color: '#DD6B20', skinColor: '#F0C8A0', hairColor: '#3D2B1F', hairStyle: 'ponytail', breathing: Math.sin(t * 2.5) * 1, blinkTimer: 3, isFleeing: true });
  drawCharacter(W * 0.5, charY - 42, 24, 46, { facing: 1, color: '#3B82F6', skinColor: '#FBBF6B', hairColor: '#3D2B1F', isCrouching: Math.sin(t * 8) > 0, breathing: Math.sin(t * 2) * 1.5, blinkTimer: 3 });

  // Controls below characters
  ctx.fillStyle = '#6B7280'; ctx.font = `${Math.round(11 * UI_S)}px monospace`; ctx.textAlign = 'center';
  if (isMobile) {
    ctx.fillText('D-pad: Move | Double-tap: Sprint | Jump + Bag buttons', W / 2, H * 0.68);
  } else {
    ctx.fillText('WASD / Arrows: Move & Jump (double jump!) | Double-tap A/D: Sprint', W / 2, H * 0.66);
    ctx.fillText('\u2193 / Space: Crouch / Teabag (rapidly while mounted) | \u2193 on platform: Drop through', W / 2, H * 0.71);
  }

  // Credits
  ctx.fillStyle = '#6B7280'; ctx.font = `${Math.round(10 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('by heyheywoah + claude opus', W / 2, H * 0.77);

  // Clawd — pixel mascot dancing in bottom-right
  const clawdX = W - 50 - HUD_INSET, clawdBaseY = H - 28;
  const bounce = Math.sin(t * 4) * 3;
  const lean = Math.sin(t * 2) * 0.08;
  const legPhase = t * 5;
  const px = 3; // pixel size
  const cc = '#D4845A'; // terracotta body color
  const ccDark = '#C07050'; // slightly darker shade
  ctx.save();
  ctx.translate(clawdX, clawdBaseY + bounce);
  ctx.rotate(lean);

  // Four legs — outer pair body-colored, inner pair lighter
  const legSwing0 = Math.sin(legPhase) * 2;
  const legSwing1 = Math.sin(legPhase + Math.PI) * 2;
  ctx.fillStyle = cc;
  ctx.fillRect(-10 + legSwing0, 1, px, px * 3);  // outer left
  ctx.fillRect(10 - px + legSwing1, 1, px, px * 3); // outer right
  ctx.fillStyle = '#E8C4AA';
  ctx.fillRect(-4 + legSwing1, 1, px, px * 3);  // inner left
  ctx.fillRect(4 - px + legSwing0, 1, px, px * 3); // inner right

  // Body — wide rectangle
  ctx.fillStyle = cc;
  ctx.fillRect(-12, -14, 24, 16);

  // Ears/nubs on top
  ctx.fillRect(-10, -18, px + 1, px + 1);
  ctx.fillRect(10 - px, -18, px + 1, px + 1);

  // Eyes — two black squares
  ctx.fillStyle = '#222';
  ctx.fillRect(-7, -11, px, px);
  ctx.fillRect(5, -11, px, px);

  ctx.restore();

  // Clawd label
  ctx.fillStyle = '#9CA3AF'; ctx.font = `bold ${Math.round(8 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('clawd', clawdX, H - 8);

  // Start prompt
  if (Math.sin(titleBlink * 3) > 0) {
    ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(18 * UI_S)}px monospace`;
    ctx.fillText(isMobile ? 'PRESS JUMP TO START' : 'PRESS ENTER TO START', W / 2, H * 0.82);
  }
}

// ── Mode Select Screen ──
function drawModeSelect() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(36 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('SELECT MODE', W / 2, H * 0.18);

  const opts = ['CAMPAIGN', 'ENDLESS'];
  const descs = ['Linear zone progression with prestige looping', 'Pick a zone and play forever'];
  for (let i = 0; i < 2; i++) {
    const y = H * 0.38 + i * Math.round(100 * UI_S);
    const selected = menuSelection === i;
    const boxW = Math.round(360 * UI_S), boxH = Math.round(70 * UI_S);
    ctx.fillStyle = selected ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
    roundRect(ctx, W / 2 - boxW / 2, y - boxH / 2, boxW, boxH, 8);
    if (selected) {
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
      ctx.strokeRect(W / 2 - boxW / 2, y - boxH / 2, boxW, boxH);
    }
    ctx.fillStyle = selected ? '#FFD700' : '#9CA3AF';
    ctx.font = `bold ${Math.round(22 * UI_S)}px monospace`;
    ctx.fillText(opts[i], W / 2, y - 4);
    ctx.fillStyle = selected ? '#ccc' : '#666';
    ctx.font = `${Math.round(11 * UI_S)}px monospace`;
    ctx.fillText(descs[i], W / 2, y + Math.round(18 * UI_S));
  }

  const t = performance.now() / 1000;
  ctx.fillStyle = '#555'; ctx.font = `${Math.round(11 * UI_S)}px monospace`;
  if (Math.sin(t * 3) > 0) {
    ctx.fillText(isMobile ? 'D-pad: Navigate | JUMP: Select' : 'W/S: Navigate | ENTER: Select', W / 2, H * 0.88);
  }
}

// ── Zone Picker Screen ──
function drawZonePicker() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(28 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('SELECT ZONE', W / 2, H * 0.12);

  // 3-card carousel within HUD bounds
  const margin = 50 + HUD_INSET;
  const usableW = W - margin * 2;
  const gap = Math.round(15 * UI_S);
  const cardW = Math.round((usableW - gap * 2) / 3);
  const cardH = Math.round(160 * UI_S);
  const cy = H * 0.48;
  const n = ZONES.length;

  for (let offset = -1; offset <= 1; offset++) {
    const i = ((zonePickerIndex + offset) % n + n) % n;
    const zone = ZONES[i];
    const selected = offset === 0;
    const locked = !unlockedZones.includes(zone.id);
    const cx = W / 2 + offset * (cardW + gap);

    // Card background
    ctx.fillStyle = selected ? 'rgba(255,215,0,0.12)' : 'rgba(255,255,255,0.04)';
    roundRect(ctx, cx - cardW / 2, cy - cardH / 2, cardW, cardH, 8);

    if (selected) {
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
      ctx.strokeRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH);
    }

    if (locked) ctx.globalAlpha = 0.3;
    else if (!selected) ctx.globalAlpha = 0.6;

    // Zone color swatch
    ctx.fillStyle = zone.displayColor;
    roundRect(ctx, cx - cardW / 2 + 8, cy - cardH / 2 + 8, cardW - 16, cardH * 0.4, 4);

    // Zone name
    ctx.fillStyle = locked ? '#555' : '#fff';
    ctx.font = `bold ${Math.round(10 * UI_S)}px monospace`;
    ctx.fillText(zone.name, cx, cy + cardH * 0.1);

    if (locked) {
      ctx.fillStyle = '#FF6B6B';
      ctx.font = `bold ${Math.round(14 * UI_S)}px monospace`;
      ctx.fillText('LOCKED', cx, cy + cardH * 0.3);
    } else {
      ctx.fillStyle = '#48BB78';
      ctx.font = `${Math.round(8 * UI_S)}px monospace`;
      ctx.fillText('UNLOCKED', cx, cy + cardH * 0.3);
    }

    ctx.globalAlpha = 1;
  }

  // Nav arrows at edges of usable area
  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(24 * UI_S)}px monospace`;
  ctx.fillText('\u25C0', margin + 10, cy);
  ctx.fillText('\u25B6', W - margin - 10, cy);

  const t = performance.now() / 1000;
  ctx.fillStyle = '#555'; ctx.font = `${Math.round(11 * UI_S)}px monospace`;
  if (Math.sin(t * 3) > 0) {
    ctx.fillText(isMobile ? 'L/R: Browse | JUMP: Select | BAG: Back' : 'A/D: Browse | ENTER: Select | ESC: Back', W / 2, H * 0.88);
  }
}

// ── Pause Menu ──
function drawPauseMenu() {
  // Semi-transparent overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700'; ctx.font = `bold ${Math.round(32 * UI_S)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H * 0.12);

  // Current zone & prestige
  ctx.fillStyle = currentZone.displayColor; ctx.font = `bold ${Math.round(16 * UI_S)}px monospace`;
  ctx.fillText(currentZone.name, W / 2, H * 0.20);
  if (gameMode === 'campaign') {
    ctx.fillStyle = '#FFD700'; ctx.font = `${Math.round(12 * UI_S)}px monospace`;
    ctx.fillText(`Prestige Level: ${prestigeLevel}`, W / 2, H * 0.26);
  }

  // Full KO stats grid
  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(14 * UI_S)}px monospace`;
  ctx.fillText('KO STATS', W / 2, H * 0.34);

  const allTypes = [
    { key: '_pedestrian', label: 'Pedestrian', color: '#9CA3AF', group: PEDESTRIAN_TYPES },
    ...CHARACTER_DEFS.filter(d => !PEDESTRIAN_TYPES.includes(d.name)).map(d => ({ key: d.name, label: d.label, color: d.trackerColor })),
  ];
  const cols = 4;
  const colW = Math.round(200 * UI_S);
  const rowH = Math.round(18 * UI_S);
  const gridStartX = W / 2 - (cols * colW) / 2;
  const gridStartY = H * 0.38;

  for (let i = 0; i < allTypes.length; i++) {
    const t = allTypes[i];
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = gridStartX + col * colW + 10;
    const y = gridStartY + row * rowH;
    const count = t.group ? t.group.reduce((s, k) => s + koTracker[k], 0) : (koTracker[t.key] || 0);

    ctx.textAlign = 'left';
    ctx.fillStyle = t.color; ctx.font = `${Math.round(10 * UI_S)}px monospace`;
    ctx.fillText(t.label, x, y);
    ctx.fillStyle = count > 0 ? '#fff' : '#555';
    ctx.textAlign = 'right';
    ctx.fillText(`${count}`, x + colW - 20, y);
  }

  // Totals
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF6B6B'; ctx.font = `bold ${Math.round(14 * UI_S)}px monospace`;
  const totalY = gridStartY + Math.ceil(allTypes.length / cols) * rowH + 15;
  ctx.fillText(`Total KOs: ${totalKOs}  |  Score: ${score}`, W / 2, totalY);

  // Menu options: Resume, SFX Mute, SFX Volume, Quit
  const menuLabels = ['RESUME', sfxMuted ? 'SFX: MUTED' : 'SFX: ON', null, 'QUIT TO MENU'];
  const rowH2 = Math.round(32 * UI_S);
  for (let i = 0; i < 4; i++) {
    const y = totalY + Math.round(36 * UI_S) + i * rowH2;
    const selected = pauseSelection === i;
    const boxW = Math.round(240 * UI_S), boxH = Math.round(26 * UI_S);
    ctx.fillStyle = selected ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
    roundRect(ctx, W / 2 - boxW / 2, y - boxH / 2, boxW, boxH, 6);
    if (selected) { ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2; ctx.strokeRect(W / 2 - boxW / 2, y - boxH / 2, boxW, boxH); }

    if (i === 2) {
      // Volume slider row
      ctx.fillStyle = selected ? '#FFD700' : '#9CA3AF';
      ctx.font = `bold ${Math.round(11 * UI_S)}px monospace`;
      ctx.textAlign = 'left';
      const sliderX = W / 2 - boxW / 2 + Math.round(12 * UI_S);
      ctx.fillText('VOL', sliderX, y + 4);
      // Draw slider track
      const trackX = sliderX + Math.round(36 * UI_S);
      const trackW = boxW - Math.round(60 * UI_S);
      const trackY = y;
      ctx.fillStyle = '#333';
      roundRect(ctx, trackX, trackY - 3, trackW, 6, 3);
      // Fill
      ctx.fillStyle = sfxMuted ? '#555' : (selected ? '#FFD700' : '#4a8');
      const fillW = trackW * sfxVolume;
      roundRect(ctx, trackX, trackY - 3, fillW, 6, 3);
      // Percent label
      ctx.fillStyle = selected ? '#FFD700' : '#9CA3AF';
      ctx.textAlign = 'right';
      ctx.fillText(`${Math.round(sfxVolume * 100)}%`, W / 2 + boxW / 2 - Math.round(10 * UI_S), y + 4);
      ctx.textAlign = 'center';
      if (selected) {
        ctx.fillStyle = '#666'; ctx.font = `${Math.round(9 * UI_S)}px monospace`;
        ctx.fillText('\u25C0 / \u25B6', W / 2, y + Math.round(16 * UI_S));
      }
    } else {
      ctx.fillStyle = selected ? '#FFD700' : '#9CA3AF';
      ctx.font = `bold ${Math.round(13 * UI_S)}px monospace`;
      ctx.fillText(menuLabels[i], W / 2, y + 4);
      if (i === 1 && selected) {
        ctx.fillStyle = '#666'; ctx.font = `${Math.round(9 * UI_S)}px monospace`;
        ctx.fillText('\u25C0 / \u25B6 to toggle', W / 2, y + Math.round(16 * UI_S));
      }
    }
  }

  const t2 = performance.now() / 1000;
  if (Math.sin(t2 * 3) > 0) {
    ctx.fillStyle = '#555'; ctx.font = `${Math.round(10 * UI_S)}px monospace`;
    ctx.fillText(isMobile ? 'D-pad: Navigate | JUMP: Select' : 'W/S: Navigate | ENTER: Select | ESC: Resume', W / 2, H * 0.94);
  }
}

// ── Main Loop ──
function endFrameInputReset(gameCtx) {
  for (const k in gameCtx.input.justPressed) delete gameCtx.input.justPressed[k];
  const t = gameCtx.input.touch;
  t.jumpJust = false; t.upJust = false; t.downJust = false;
  t.leftJust = false; t.rightJust = false; t.bagJust = false; t.pauseJust = false;
}

function loop(gameCtx, timestamp) {
  const dt = Math.min((timestamp - gameCtx.state.lastTime) / 1000, 1 / 30);
  gameCtx.state.lastTime = timestamp;
  update(gameCtx, dt);
  render(gameCtx, dt);
  endFrameInputReset(gameCtx);
  requestAnimationFrame(ts => loop(gameCtx, ts));
}

// Init — set up default zone layout for title screen background
initZoneLayout();
loadDesignerPayloadRegistry();
initMatterFX();

requestAnimationFrame(ts => { GAME_CTX.state.lastTime = ts; loop(GAME_CTX, ts); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
