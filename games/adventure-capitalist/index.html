<!doctype html>
<html lang="en-us">
 
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | AdVenture Capitalist!</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
</head>
 
<body class="template">
    <div class="webgl-content">
        <div id="unityContainer" style="width: 960px; height: 600px; padding: 0px; margin: 0px; border: 0px; position: relative; background: rgb(35, 31, 32);">
          
      <canvas  class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" id="canvas"width=335 height=667 style="width: 100%; height: 100%; background: #231F20"></canvas>
      
    <div id="loadingBox">
        <div id="bgBar"></div>
        <div id="progressBar"></div>
        <p id="loadingInfo">Loading...</p>
    </div>
    <script type='text/javascript'>
        // connect to canvas
        var Module = {
            TOTAL_MEMORY: 201326592,
            filePackagePrefixURL: "Release/",
            memoryInitializerPrefixURL: "Release/",
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    console.log(text);
                };
            })(),
            printErr: function(text) {
                console.error(text);
            },
            canvas: document.getElementById('canvas'),
            progress: null,
            setStatus: function(text) {
                if (this.progress == null) {
                    if (typeof UnityProgress != 'function')
                        return;
                    this.progress = new UnityProgress(canvas);
                }
                if (!Module.setStatus.last) Module.setStatus.last = {
                    time: Date.now(),
                    text: ''
                };
                if (text === Module.setStatus.text) return;
                this.progress.SetMessage(text);
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m)
                    this.progress.SetProgress(parseInt(m[2]) / parseInt(m[4]));
                if (text === "")
                    this.progress.Clear()
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };
        Module.setStatus('Downloading (0.0/1)');

        // Seed a fresh profile with 1100 Angels (best-effort via Unity SendMessage hooks).
        // Runs once per browser profile.
        (function setupAngelSeed() {
            var SEED_KEY = 'adcap_seed_angels_1100_v1';
            if (localStorage.getItem(SEED_KEY) === 'done') return;

            function trySeed() {
                if (typeof Module === 'undefined' || typeof Module.SendMessage !== 'function') return false;

                var objects = [
                    'GameController', 'InvestorsUI', 'MainUIController', 'Main UI Canvas',
                    'PlanetBoostPanel', 'MissionControl', 'MONEY', 'Angel Investors', 'Angel Claim'
                ];
                var methods = [
                    'SetAngelInvestorData', 'AddAngelInvestorBonus', 'set_AngelInvestorBonus',
                    'set_AngelBonus', 'SetAngelsQuikBuyParent', 'SetCashHackAmount', 'AddCash'
                ];

                try {
                    // Cash hack fallback to quickly enable angel claiming, if angel-specific calls are ignored.
                    Module.SendMessage('MONEY', 'SetCashHackAmount', '1e120');
                    Module.SendMessage('MONEY', 'AddCash', '');
                } catch (e) {}

                for (var i = 0; i < objects.length; i++) {
                    for (var j = 0; j < methods.length; j++) {
                        try {
                            Module.SendMessage(objects[i], methods[j], '1100');
                        } catch (e) {}
                    }
                }

                localStorage.setItem(SEED_KEY, 'done');
                console.log('[AdCap Seed] Attempted angel seed to 1100.');
                return true;
            }

            Module.postRun = Module.postRun || [];
            Module.postRun.push(function () {
                // Try immediately and then once more shortly after UI systems initialize.
                trySeed();
                setTimeout(trySeed, 2500);
            });
        })();
    </script>
    <script src="Release/UnityConfig.js"></script>
    <script src="Release/fileloader.js"></script>
    <script>
        if (!(!Math.fround)) {
            var script = document.createElement('script');
            script.src = "Release/webgl.js";
            document.body.appendChild(script);
        } else {
            var codeXHR = new XMLHttpRequest();
            codeXHR.open('GET', 'Release/webgl.js', true);
            codeXHR.onload = function() {
                var code = codeXHR.responseText;
                if (!Math.fround) {
                    try {
                        console.log('optimizing out Math.fround calls');
                        var m = /var ([^=]+)=global\.Math\.fround;/.exec(code);
                        var minified = m[1];
                        if (!minified) throw 'fail';
                        var startAsm = code.indexOf('// EMSCRIPTEN_START_FUNCS');
                        var endAsm = code.indexOf('// EMSCRIPTEN_END_FUNCS');
                        var asm = code.substring(startAsm, endAsm);
                        do {
                            var moar = false; // we need to re-do, as x(x( will not be fixed
                            asm = asm.replace(new RegExp('[^a-zA-Z0-9\\$\\_]' + minified + '\\(', 'g'), function(s) {
                                moar = true;
                                return s[0] + '('
                            });
                        } while (moar);
                        code = code.substring(0, startAsm) + asm + code.substring(endAsm);
                        code = code.replace("'use asm'", "'almost asm'");
                    } catch (e) {
                        console.log('failed to optimize out Math.fround calls ' + e)
                    }
                }
                var blob = new Blob([code], {
                    type: 'text/javascript'
                });
                codeXHR = null;
                var src = URL.createObjectURL(blob);
                var script = document.createElement('script');
                script.src = URL.createObjectURL(blob);
                script.onload = function() {
                    URL.revokeObjectURL(script.src);
                };
                document.body.appendChild(script);
            };
            codeXHR.send(null);
        }
    </script>
</body>
 
</html>
